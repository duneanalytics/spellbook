version: 2

sources:
  - name: kalshi
    tables:
      - name: trade_report
        description: "Daily aggregated trade data for Kalshi event contracts"
        meta:
          docs_slug: /curated/prediction-markets/kalshi/trade_report
      - name: market_report
        description: "Market-level metadata for Kalshi event contracts"
        meta:
          docs_slug: /curated/prediction-markets/kalshi/market_report
      - name: market_trades_raw
        description: "Individual trade executions from Kalshi API"
      - name: markets_raw
        description: "Market-level snapshot with pricing, volume, and metadata from Kalshi API. NOTE: ingest cursor is min_created_ts, so per-row volume_fp/updated_time can freeze at creation for actively-traded markets. Use `market_updates_raw` for live volume."
      - name: market_updates_raw
        description: "Per-tick market state updates streamed from the Kalshi ticker WebSocket (one row per state change). Carries live volume_fp, open_interest_fp, bid/ask, and last price. Use this when fresh per-ticker volume is required; `markets_raw` can lag because its ingest cursor is min_created_ts and does not re-fetch existing markets."
        columns:
          - name: market_ticker
            description: "Kalshi ticker. Joins to `markets_raw.ticker` and `market_trades_raw.ticker`."
          - name: ts
            description: "Unix epoch seconds at which Kalshi sent the update."
          - name: ts_ms
            description: "Unix epoch milliseconds at which Kalshi sent the update."
          - name: received_hour
            description: "Hour bucket (UTC, YYYY-MM-DDTHH) used as the table partition column."
          - name: volume_fp
            description: "Cumulative volume in contracts for the market, as of `ts`."
      - name: market_details_raw
        description: "Event-level metadata from Kalshi API"
      - name: series_raw
        description: "Series-level metadata from Kalshi API (one row per series_ticker). Carries canonical category, frequency, fee structure, and other series-stable fields."
      - name: markets_lifecycle_raw
        description: "Per-market lifecycle events (created, determined, settled, deactivated) streamed from Kalshi WebSocket. received_ts is reliable ingest time; event_type='determined' carries result/settlement_value/determination_ts, event_type='settled' carries settled_ts."
        columns:
          - name: event_type
            description: "Lifecycle transition label from Kalshi WS. Allowlist tripwires when Kalshi adds a new value: investigate whether it carries settlement-relevant fields, then extend this list."
            data_tests:
              - accepted_values:
                  arguments:
                    values:
                      - created
                      - activated
                      - deactivated
                      - close_date_updated
                      - determined
                      - settled
                      - fractional_trading_updated
                      - price_level_structure_updated
                      - metadata_updated
