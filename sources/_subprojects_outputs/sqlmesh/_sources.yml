version: 2

sources:
  - name: prices
    description: "Price data from various sources and time granularities"
    meta:
      docs_slug: /curated/prices/prices_day
    tables:
      - name: day
        description: "Daily token prices aggregated from various sources. Token symbols are not unique; use (blockchain, contract_address) to identify tokens."
        columns:
          - name: blockchain
            description: "Native blockchain of the token"
            type: varchar
          - name: contract_address
            description: "Contract address of the token"
            type: varbinary
          - name: symbol
            description: "Token symbol (not unique; do not use as a standalone identifier)"
            type: varchar
          - name: timestamp
            description: "UTC timestamp for the day"
            type: "timestamp(3) with time zone"
          - name: price
            description: "USD price of a token"
            type: double
          - name: decimals
            description: "Number of decimals for the token contract"
            type: bigint
          - name: volume
            description: "Trading volume in USD"
            type: double
          - name: source
            description: "Source of the price data"
            type: varchar
          - name: source_timestamp
            description: "Original timestamp from the source"
            type: "timestamp(3) with time zone"

      - name: hour
        description: "Hourly token prices aggregated from various sources. Token symbols are not unique; use (blockchain, contract_address) to identify tokens."
        meta:
          docs_slug: /curated/prices/prices_hour
        columns:
          - name: blockchain
            description: "Native blockchain of the token"
            type: varchar
          - name: contract_address
            description: "Contract address of the token"
            type: varbinary
          - name: symbol
            description: "Token symbol (not unique; do not use as a standalone identifier)"
            type: varchar
          - name: timestamp
            description: "UTC timestamp for the hour"
            type: "timestamp(3) with time zone"
          - name: price
            description: "USD price of a token"
            type: double
          - name: decimals
            description: "Number of decimals for the token contract"
            type: bigint
          - name: volume
            description: "Trading volume in USD"
            type: double
          - name: source
            description: "Source of the price data"
            type: varchar
          - name: source_timestamp
            description: "Original timestamp from the source"
            type: "timestamp(3) with time zone"

      - name: minute
        description: "Minute-level token prices aggregated from various sources. Token symbols are not unique; use (blockchain, contract_address) to identify tokens."
        meta:
          docs_slug: /curated/prices/prices_minute
        columns:
          - name: blockchain
            description: "Native blockchain of the token"
            type: varchar
          - name: contract_address
            description: "Contract address of the token"
            type: varbinary
          - name: symbol
            description: "Token symbol (not unique; do not use as a standalone identifier)"
            type: varchar
          - name: timestamp
            description: "UTC timestamp for the minute"
            type: "timestamp(3) with time zone"
          - name: price
            description: "USD price of a token"
            type: double
          - name: decimals
            description: "Number of decimals for the token contract"
            type: bigint
          - name: volume
            description: "Trading volume in USD"
            type: double
          - name: source
            description: "Source of the price data"
            type: varchar
          - name: source_timestamp
            description: "Original timestamp from the source"
            type: "timestamp(3) with time zone"

      - name: latest
        description: "Latest available token prices from various sources. Token symbols are not unique; use (blockchain, contract_address) to identify tokens. "
        meta:
          docs_slug: /curated/prices/prices_latest
        columns:
          - name: blockchain
            description: "Native blockchain of the token"
            type: varchar
          - name: contract_address
            description: "Contract address of the token"
            type: varbinary
          - name: symbol
            description: "Token symbol"
            type: varchar
          - name: price
            description: "USD price of a token"
            type: double
          - name: decimals
            description: "Number of decimals for the token contract"
            type: bigint
          - name: timestamp
            description: "UTC timestamp of the latest price"
            type: "timestamp(3) with time zone"
          - name: volume
            description: "Trading volume in USD"
            type: double
          - name: source
            description: "Source of the price data"
            type: varchar

  - name: prices_external
    description: "Price data from CoinPaprika API"
    tables:
      - name: minute
        meta:
          docs_slug: /curated/prices/prices_external_minute
      - name: hour
        meta:
          docs_slug: /curated/prices/prices_external_hour
      - name: day
        meta:
          docs_slug: /curated/prices/prices_external_day
      - name: latest
        meta:
          docs_slug: /curated/prices/prices_external_latest
  - name: prices_dex
    description: "Price data from DEX pipeline"
    tables:
      - name: minute
        meta:
          docs_slug: /curated/prices/prices_dex_minute
      - name: hour
        meta:
          docs_slug: /curated/prices/prices_dex_hour
      - name: day
        meta:
          docs_slug: /curated/prices/prices_dex_day
      - name: latest
        meta:
          docs_slug: /curated/prices/prices_dex_latest
  - name: tokens_v2
    tables:
      - name: erc20
        description: "ERC20 tokens"
  - name: tokens_solana
    tables:
      - name: fungible
        description: "Fungible Token Program Mint Addresses, Symbols and Decimals"
        meta:
          docs_slug: /curated/token-metadata/solana/token-metadata
        columns:
          - name: token_mint_address
            description: "fungible token mint address on Solana"
          - name: symbol
            description: "token symbol"
          - name: decimals
            description: "Number of decimals, refers to how divisible a token can be"
          - name: metadata_program
            description: program used for creating token metadata
          - name: token_version
            description: version of the token program used (spl_token, token2022)
          - name: created_at
            description: token mint created at
          - name: init_tx
            description: "transaction that initialized the mint"
      - name: transfers
        description: "Solana token transfers"
        meta:
          docs_slug: /curated/token-transfers/solana/solana-token-transfers
        config:
          event_time: block_date
        columns:
          - name: block_time
          - name: block_date
          - name: block_slot
          - name: action
          - name: token_mint_address
          - name: amount
          - name: fee
          - name: token_version
          - name: from_owner
          - name: to_owner
          - name: from_token_account
          - name: to_token_account
          - name: token_version
          - name: tx_signer
          - name: tx_id
          - name: tx_index
          - name: outer_instruction_index
          - name: inner_instruction_index
          - name: outer_executing_account
  - name: solana_utils
    tables:
      - name: token_address_mapping
  - name: token_accounts_solana
    tables:
      - name: state_history
        identifier: state_history_002