version: 2

sources:
  # VVS Finance - Uniswap V2 + V3 style AMM
  - name: vvs_finance_cronos
    description: "Decoded VVS Finance contracts on cronos (V2 and V3 AMM)"
    tables:
      - name: FactoryV2_evt_PairCreated
        description: "VVS Finance V2 factory PairCreated events, mapping each pair to its token0/token1"
      - name: Pair_evt_Swap
        description: "VVS Finance V2 pair Swap events"
      - name: FactoryV3_evt_PoolCreated
        description: "VVS Finance V3 factory PoolCreated events, mapping each pool to its token0/token1/fee"
      - name: Pool_evt_Swap
        description: "VVS Finance V3 pool Swap events"

  # Ferro - Saddle/StableSwap style AMM
  - name: ferro_cronos
    description: "Decoded Ferro contracts on cronos (StableSwap AMM)"
    tables:
      - name: SwapDeployer_evt_NewSwapPool
        description: "Ferro SwapDeployer NewSwapPool events, mapping each deployed swap pool to its pooled tokens"
      - name: Swap_evt_TokenSwap
        description: "Ferro Swap TokenSwap events"

  # Cronaswap - Uniswap V2 style AMM (V1 + V2 factories)
  - name: cronaswap_cronos
    description: "Decoded Cronaswap contracts on cronos (V1 and V2 AMM)"
    tables:
      - name: CronaSwapFactoryV1_evt_PairCreated
        description: "Cronaswap V1 factory PairCreated events, mapping each pair to its token0/token1"
      - name: CronaSwapFactoryV2_evt_PairCreated
        description: "Cronaswap V2 factory PairCreated events, mapping each pair to its token0/token1"
      - name: CronaSwapPair_evt_Swap
        description: "Cronaswap pair Swap events (shared pair contract across V1 and V2 factories)"
