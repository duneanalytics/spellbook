version: 2

sources:
  # ===========================================
  # Base EVM Source (transactions, blocks etc.)
  # ===========================================
  - name: hedera
    description: "Raw EVM tables for the hedera chain. This source provides access to fundamental blockchain data like blocks, transactions, logs, and traces."
    tables:
      - name: transactions
        description: "{{ doc('hedera_transactions_doc') }}"
        columns:
          - &block_date
            name: block_date
            description: "The UTC date of the block in which this transaction was included"
          - &block_time
            name: block_time
            description: "The exact UTC timestamp when the block containing this transaction was mined/sequenced"
          - &value
            name: value
            description: "Amount of native currency (e.g., HBAR) sent from sender to recipient"
          - &block_number
            name: block_number
            description: "The sequential number (height) of the block containing this transaction"
          - name: gas_limit
            description: "Maximum number of gas units this transaction was allowed to consume"
          - name: gas_price
            description: "Price per unit of gas for this transaction, denominated in wei"
          - name: gas_used
            description: "Actual amount of gas units consumed by this transaction's execution"
          - name: max_fee_per_gas
            description: "Maximum total fee per gas unit the sender was willing to pay (base fee + priority fee)"
          - name: max_priority_fee_per_gas
            description: "Maximum tip per gas unit the sender was willing to pay to the validator"
          - name: base_fee_per_gas
            description: "The network base fee per gas unit for the block containing this transaction"
          - name: nonce
            description: "Sequential number for transactions sent from the sender's address, preventing replays"
          - name: index
            description: "Integer position of this transaction within the list of transactions in its block"
          - &success
            name: success
            description: "Boolean flag indicating if the transaction executed successfully (true) or failed/reverted (false)"
          - &from
            name: from
            description: "Address of the account that initiated and signed this transaction"
          - &to
            name: to
            description: "Address of the recipient account or contract; null for contract creation transactions"
          - &block_hash
            name: block_hash
            description: "Unique 256-bit identifier (hash) of the block containing this transaction"
          - name: data
            description: "Input data payload for the transaction, often containing function selectors and arguments for contract calls"
          - name: hash
            description: "Unique 256-bit identifier (hash) of this specific transaction"
          - name: type
            description: "Numeric type of the transaction indicating its format and fee mechanism"
          - name: access_list
            description: "List of addresses and storage keys the transaction preemptively specified access to (EIP-2930 and later types)"

      - name: traces
        description: "{{ doc('hedera_traces_doc') }}"
        columns:
          - *block_date
          - *block_time
          - *block_number
          - *value
          - name: gas
            description: "Amount of gas allocated for this trace's execution"
          - name: gas_used
            description: "Actual amount of gas consumed by this specific trace step"
          - *block_hash
          - name: success
            description: "Boolean flag indicating if this specific trace step executed successfully"
          - &tx_index
            name: tx_index
            description: "Index of the parent transaction within its containing block"
          - name: subtraces
            description: "Number of direct child traces initiated by this trace"
          - name: error
            description: "Error message or reason if this trace step failed/reverted"
          - name: tx_success
            description: "Boolean flag indicating the success status of the parent transaction"
          - &tx_hash
            name: tx_hash
            description: "Unique 256-bit identifier (hash) of the parent transaction"
          - name: from
            description: "Address initiating this trace step (caller)"
          - name: to
            description: "Address receiving this trace step (callee)"
          - name: trace_address
            description: "Array representing the path from the root trace to this trace within the execution tree"
          - name: type
            description: "Type of trace action (e.g., 'call', 'staticcall', 'delegatecall', 'create', 'suicide')"
          - name: address
            description: "Address associated with the trace action (e.g., newly created contract address)"
          - name: code
            description: "Bytecode of the contract being created"
          - name: call_type
            description: "Specific type of call operation (e.g., 'call', 'delegatecall', 'staticcall')"
          - name: input
            description: "Input data provided for this trace step"
          - name: output
            description: "Output data returned by this trace step"
          - name: refund_address
            description: "Address designated to receive the contract balance upon self-destruction"

      - name: traces_decoded
        description: "{{ doc('hedera_traces_decoded_doc') }}"
        columns:
          - *block_date
          - *block_time
          - *block_number
          - *tx_hash
          - name: contract_name
            description: "Human-readable name of the smart contract involved in this trace"
          - name: function_name
            description: "Name of the specific contract function called in this trace"
          - name: namespace
            description: "Categorical grouping or project name associated with the contract"
          - name: signature
            description: "8 byte function signature used to identify the function"
          - name: to
            description: "Address of the contract or account receiving this trace"
          - name: trace_address
            description: "Array indicating the exact position of this trace within the trace tree of the transaction"

      - name: logs
        description: "{{ doc('hedera_logs_doc') }}"
        columns:
          - *block_date
          - *block_time
          - *block_number
          - *block_hash
          - *tx_index
          - *tx_hash
          - name: contract_address
            description: "Address of the smart contract that emitted this event log"
          - name: topic0
            description: "First indexed topic, typically the hash of the event signature"
          - name: topic1
            description: "Second indexed topic, often used for indexed event parameters"
          - name: topic2
            description: "Third indexed topic, used for additional indexed event parameters"
          - name: topic3
            description: "Fourth indexed topic, used for further indexed event parameters"
          - name: data
            description: "Non-indexed event parameters, ABI-encoded into a single data payload"
          - name: index
            description: "Integer position of this log within the list of all logs in the block"

      - name: logs_decoded
        description: "{{ doc('hedera_logs_decoded_doc') }}"
        columns:
          - *block_date
          - *block_time
          - *block_number
          - *tx_hash
          - name: index
            description: "Position of this log within the block"
          - name: contract_address
            description: "Address of the smart contract that emitted this log"
          - name: namespace
            description: "Categorical grouping or project name associated with the contract"
          - name: contract_name
            description: "Name of the smart contract that emitted this log"
          - name: event_name
            description: "Name of the event emitted in this log"
          - name: signature
            description: "Topic0 hash of the event signature"

      - name: blocks
        description: "{{ doc('hedera_blocks_doc') }}"
        columns:
          - name: base_fee_per_gas
            description: "The network base fee per gas unit for this block"
          - name: difficulty
            description: "Difficulty level required to mine this block"
          - name: total_difficulty
            description: "Cumulative difficulty of the chain up to and including this block"
          - name: gas_limit
            description: "Total gas limit for the block"
          - name: gas_used
            description: "Total amount of gas consumed by all transactions included in this block"
          - name: hash
            description: "Unique 256-bit identifier (hash) of this block"
          - name: miner
            description: "Address of the account that proposed this block"
          - name: nonce
            description: "Nonce value used in the block header"
          - name: number
            description: "Sequential block number (height) of this block in the blockchain"
          - name: parent_hash
            description: "Hash of the preceding block in the chain"
          - name: size
            description: "Size of the block data in bytes"
          - name: time
            description: "Timestamp (UTC) when the block was produced"

      - name: contracts
        description: "{{ doc('hedera_contracts_doc') }}"
        columns:
          - name: abi_id
            description: "Unique identifier linking to a known contract ABI repository"
          - name: abi
            description: "JSON representation of the contract's ABI, if available"
          - name: address
            description: "Address where the contract is deployed"
          - name: from
            description: "Address that deployed this contract"
          - name: code
            description: "Bytecode of the contract at the time of creation"
          - name: name
            description: "Human-readable name assigned to the contract"
          - name: namespace
            description: "Categorical namespace or project associated with the contract"
          - name: dynamic
            description: "Boolean indicating if this contract was submitted with the 'dynamic' flag enabled"
          - name: ethereum
            description: "Boolean indicating if this is a manual individual submission of a contract"
          - name: factory
            description: "Boolean indicating if this submission was submitted with the 'factory' flag enabled"
          - name: detection_source
            description: "Method used to detect and decode this contract"
          - name: created_at
            description: "Timestamp of when this contract was first decoded on Dune"

      - name: creation_traces
        description: "{{ doc('hedera_creation_traces_doc') }}"
        columns:
          - *block_time
          - *block_number
          - *tx_hash
          - name: address
            description: "Address of the contract created"
          - name: from
            description: "Address that created this contract"
          - name: code
            description: "Deployed bytecode of the contract"

  # ===========================================
  # ERC20 Source
  # ===========================================
  - name: erc20_hedera
    description: "Standard ERC20 Fungible Token event tables for hedera"
    tables:
      - name: evt_Transfer
        description: "{{ doc('erc20_hedera_evt_Transfer_doc') }}"
        columns:
          - name: contract_address
            description: "Address of the ERC20 token contract that emitted this event"
          - &evt_tx_hash
            name: evt_tx_hash
            description: "Hash of the transaction containing this event"
          - &evt_index
            name: evt_index
            description: "Index position of this event within the transaction"
          - &evt_block_time
            name: evt_block_time
            description: "Timestamp of the block containing this event"
          - &evt_block_number
            name: evt_block_number
            description: "The block number containing this event"
          - *from
          - *to
          - name: value
            description: "Amount of ERC20 tokens transferred, in the token's native decimal representation (raw value)"

      - name: evt_Approval
        description: "{{ doc('erc20_hedera_evt_Approval_doc') }}"
        columns:
          - name: contract_address
            description: "Address of the ERC20 token contract"
          - *evt_tx_hash
          - *evt_index
          - *evt_block_time
          - *evt_block_number
          - name: owner
            description: "Address of the token owner granting approval"
          - name: spender
            description: "Address being granted permission to spend tokens"
          - name: value
            description: "Amount of ERC20 tokens approved for spending (raw value)"

  # ===========================================
  # ERC721 Source
  # ===========================================
  - name: erc721_hedera
    description: "Standard ERC721 NFT event tables for hedera"
    tables:
      - name: evt_Transfer
        description: "{{ doc('erc721_hedera_evt_Transfer_doc') }}"
        columns:
          - name: contract_address
            description: "Address of the ERC721 token contract"
          - *evt_tx_hash
          - *evt_index
          - *evt_block_time
          - *evt_block_number
          - *from
          - *to
          - name: tokenId
            description: "Unique identifier of the specific ERC721 token (NFT) being transferred"

      - name: evt_Approval
        description: "{{ doc('erc721_hedera_evt_Approval_doc') }}"
        columns:
          - name: contract_address
            description: "Address of the ERC721 token contract"
          - *evt_tx_hash
          - *evt_index
          - *evt_block_time
          - *evt_block_number
          - &approved
            name: approved
            description: "Address approved to manage the specific tokenId"
          - &owner
            name: owner
            description: "Address of the token owner"
          - name: tokenId
            description: "Unique identifier of the specific ERC721 token for which approval is granted/revoked"

      - name: evt_ApprovalForAll
        description: "{{ doc('erc721_hedera_evt_ApprovalForAll_doc') }}"
        columns:
          - name: contract_address
            description: "Address of the ERC721 token contract"
          - *evt_tx_hash
          - *evt_index
          - *evt_block_time
          - *evt_block_number
          - &approved_flag
            name: approved
            description: "Boolean indicating whether the operator is approved for all tokens (true) or revoked (false)"
          - *owner
          - name: operator
            description: "Address granted or revoked permission to manage all of the owner's tokens"

  # ===========================================
  # ERC1155 Source
  # ===========================================
  - name: erc1155_hedera
    description: "Standard ERC1155 multi-token standard event tables for hedera"
    tables:
      - name: evt_TransferSingle
        description: "{{ doc('erc1155_hedera_evt_TransferSingle_doc') }}"
        columns:
          - name: contract_address
            description: "Address of the ERC1155 token contract"
          - *evt_tx_hash
          - *evt_index
          - *evt_block_time
          - *evt_block_number
          - name: operator
            description: "Address that initiated the transfer (may be owner or approved operator)"
          - *from
          - *to
          - name: id
            description: "Identifier of the specific ERC1155 token type being transferred"
          - name: value
            description: "Quantity of the specific ERC1155 token type transferred"

      - name: evt_TransferBatch
        description: "{{ doc('erc1155_hedera_evt_TransferBatch_doc') }}"
        columns:
          - name: contract_address
            description: "Address of the ERC1155 token contract"
          - *evt_tx_hash
          - *evt_index
          - *evt_block_time
          - *evt_block_number
          - name: operator
            description: "Address that initiated the batch transfer"
          - *from
          - *to
          - name: ids
            description: "Array of identifiers for the ERC1155 token types transferred in the batch"
          - name: values
            description: "Array of quantities for each ERC1155 token type transferred"

      - name: evt_ApprovalForAll
        description: "{{ doc('erc1155_hedera_evt_ApprovalForAll_doc') }}"
        columns:
          - name: contract_address
            description: "Address of the ERC1155 token contract"
          - *evt_tx_hash
          - *evt_index
          - *evt_block_time
          - *evt_block_number
          - *approved_flag
          - *owner
          - name: operator
            description: "Address granted or revoked permission to manage all of the owner's tokens"
