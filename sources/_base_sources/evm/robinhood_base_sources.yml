version: 2

sources:
  - name: robinhood
    description: "Raw EVM tables for the Robinhood chain. This source provides access to fundamental blockchain data like blocks, transactions, logs, and traces."
    tables:
      - name: blocks
      - name: transactions
      - name: traces
      - name: traces_decoded
      - name: logs
      - name: logs_decoded
      - name: contracts
      - name: creation_traces

  - name: erc20_robinhood
    description: "Standard ERC20 fungible token event tables for Robinhood."
    tables:
      - name: evt_Transfer
      - name: evt_Approval

  - name: erc721_robinhood
    description: "Standard ERC721 non-fungible token event tables for Robinhood."
    tables:
      - name: evt_Transfer
      - name: evt_Approval
      - name: evt_ApprovalForAll

  - name: erc1155_robinhood
    description: "Standard ERC1155 multi-token event tables for Robinhood."
    tables:
      - name: evt_TransferSingle
      - name: evt_TransferBatch
      - name: evt_ApprovalForAll
      - name: evt_URI
