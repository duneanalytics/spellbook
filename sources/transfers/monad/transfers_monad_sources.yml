version: 2

sources:
  - name: wmon_monad
    tables:
      - name: wmon_evt_deposit
        description: "WMON deposits"
        columns:
          - &contract_address
            name: contract_address
            description: "Contract address for token"
          - &dst
            name: dst
            description: "Wallet address for WMON deposits"
          - &evt_block_number
            name: evt_block_number
            description: "Block event number"
          - &evt_block_time
            name: evt_block_time
            description: "Timestamp for block event time in UTC"
          - &evt_index
            name: evt_index
            description: "Event index"
          - &evt_tx_hash
            name: evt_tx_hash
            description: "Event transaction hash"
          - &wad
            name: wad
            description: "Raw amount of WMON"

      - name: wmon_evt_withdrawal
        description: "WMON withdrawals"
        columns:
          - *contract_address
          - &src
            name: src
            description: "Wallet address for WMON withdrawals"
          - *evt_block_number
          - *evt_block_time
          - *evt_index
          - *evt_tx_hash
          - *wad
