version: 2

sources:
  - name: prices
    description: "Prices tables across blockchains"
    tables:
      - name: usd_0003
        description: "raw, versioned USD prices table"
      - name: fx_exchange_rates
        description: "Daily FX exchange rates between currency pairs"
      - name: usd
        description: "USD prices across blockchains. Token symbols are not unique; use (blockchain, contract_address) to identify a token."
        meta:
          docs_slug: /curated/asset-tracking/prices/prices
        columns:
          - name: minute
            description: "UTC event block time truncated to the minute mark"
          - name: blockchain
            description: "Native blockchain of the token"
          - name: contract_address
            description: "Contract address of the token"
          - name: symbol
            description: "Token symbol. Not unique across tokens and should not be used as a standalone identifier."
          - name: price
            description: "USD price of a token"