# PRs only for Dependabot security alerts, not routine version bumps (open-pull-requests-limit: 0).
version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 0
    groups:
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 0
    groups:
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
