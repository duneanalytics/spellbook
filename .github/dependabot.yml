version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    # team-reviewers: valid for GitHub Dependabot; omitted from json.schemastore.org/dependabot-2.0.json
    team-reviewers:
      - "duneanalytics/team-curated-data"
    groups:
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
      minor-and-patch:
        patterns:
          - "*"
        update-types: ["minor", "patch"]
      major-updates:
        patterns:
          - "*"
        update-types: ["major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # team-reviewers: valid for GitHub Dependabot; omitted from json.schemastore.org/dependabot-2.0.json
    team-reviewers:
      - "duneanalytics/team-curated-data"
    groups:
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
      minor-and-patch:
        patterns:
          - "*"
        update-types: ["minor", "patch"]
      major-updates:
        patterns:
          - "*"
        update-types: ["major"]
