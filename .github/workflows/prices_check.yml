# .github/workflows/app.yaml
name: Token Prices Automation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'dbt_subprojects/tokens/models/prices/*/*.sql'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  token-prices-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository code
        uses: actions/checkout@v2


      - name: Fetch base commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git fetch origin "$BASE_SHA"

      - name: Fetch head commit
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git fetch origin "$HEAD_SHA"

      - name: Get prices diff
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "${BASE_SHA}..${HEAD_SHA}" dbt_subprojects/tokens/models/prices/**/*.sql | grep '^\+ ' > scripts/new_lines.txt

      - name: Run validations
        id: validations
        run: python scripts/check_tokens.py --file_name scripts/new_lines.txt
