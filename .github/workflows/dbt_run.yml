name: DBT Run Reusable Workflow

on:
  workflow_call:
    inputs:
      project:
        description: 'DBT run for project'
        required: true
        type: string

permissions:
  contents: read

jobs:
  dbt-test:
    runs-on: [ self-hosted, linux, spellbook-trino-ci ]
    timeout-minutes: 90

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync Python dependencies
        run: uv sync --locked

      - name: Setup variables
        run: |
          echo "DBT_CI_SCHEMA=dune_spellbook_ci__tmp_pr${{ github.event.number }}_${{ github.run_id }}_${{ github.run_attempt }}" >> $GITHUB_ENV
          echo "PROFILE=--profiles-dir $HOME/.dbt --profile dunesql --target ci" >> $GITHUB_ENV
          echo "S3_LOCATION=s3://manifest-spellbook-dunesql/${{inputs.project}}" >> $GITHUB_ENV
          PROJECT_DIR=dbt_subprojects/${{ inputs.project }}
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Get latest manifest
        run: "aws s3 cp $S3_LOCATION/manifest.json $PROJECT_DIR/manifest.json"
        continue-on-error: true # Temprorary until all projects have manifest

      - name: dbt dependencies
        working-directory: ${{env.PROJECT_DIR}}
        run: "uv run dbt deps"

      - name: Activate DuneSQL Cluster
        run: "uv run bash ./scripts/ensure_cluster.sh"

      - name: dbt compile to create manifest to compare to
        run: "uv run dbt --warn-error compile $PROFILE --project-dir ${PROJECT_DIR}"

      - name: check schemas
        run: "uv run bash ./scripts/check_schema.sh"

      - name: dbt seed
        run: "uv run dbt seed $PROFILE --select @state:modified.body @state:modified.macros --exclude tag:prod_exclude tag:remove --state . --project-dir ${PROJECT_DIR}"

      - name: list downstream models
        run: "uv run bash ./scripts/list_modified_downstream.sh"

      - name: dbt run initial model(s)
        run: "uv run dbt -x run $PROFILE --select state:modified.body state:modified.macros --exclude tag:prod_exclude tag:remove --defer --state . --project-dir ${PROJECT_DIR}"

      - name: Store initial dbt run results
        run: |
          mkdir -p "$RUNNER_TEMP/dbt-built-relations"
          cp "$PROJECT_DIR/target/run_results.json" "$RUNNER_TEMP/dbt-built-relations/initial_run_results.json"

      - name: dbt test initial model(s)
        run: "uv run dbt test $PROFILE --select state:new state:modified.body state:modified.macros --exclude tag:prod_exclude tag:remove --defer --state . --project-dir ${PROJECT_DIR}"

      - name: Set environment variable for incremental model count
        run: |
          echo "INC_MODEL_COUNT=$(uv run dbt ls $PROFILE --select state:modified.body,config.materialized:incremental state:modified.macros,config.materialized:incremental --state . --resource-type model --project-dir ${PROJECT_DIR} | wc -l)" >> $GITHUB_ENV

      - name: dbt run incremental model(s) if applicable
        if: env.INC_MODEL_COUNT > 0
        run: "uv run dbt run $PROFILE --select state:modified.body,config.materialized:incremental state:modified.macros,config.materialized:incremental --exclude tag:prod_exclude tag:remove --defer --state . --project-dir ${PROJECT_DIR}"

      - name: dbt test incremental model(s) if applicable
        if: env.INC_MODEL_COUNT > 0
        run: "uv run dbt test $PROFILE --select state:modified.body,config.materialized:incremental state:modified.macros,config.materialized:incremental --exclude tag:prod_exclude tag:remove --defer --state . --project-dir ${PROJECT_DIR}"

      - name: Build queryable Dune CI tables comment
        if: github.event_name == 'pull_request'
        env:
          DBT_BUILT_RELATIONS_DIR: ${{ runner.temp }}/dbt-built-relations
          DBT_CI_TABLES_COMMENT_PATH: ${{ runner.temp }}/dbt-built-relations/comment_body.md
          PROJECT_DIR: ${{ env.PROJECT_DIR }}
          PROJECT_NAME: ${{ inputs.project }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: uv run python scripts/comment_dbt_ci_tables.py

      - name: Upload queryable Dune CI tables comment
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dbt-ci-tables-comment-${{ inputs.project }}
          path: ${{ runner.temp }}/dbt-built-relations/comment_body.md
          if-no-files-found: ignore

  comment-dbt-ci-tables:
    needs: dbt-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write

    steps:
      - name: Download queryable Dune CI tables comment
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: dbt-ci-tables-comment-${{ inputs.project }}
          path: ${{ runner.temp }}/dbt-ci-tables-comment

      - name: Upsert queryable Dune CI tables comment
        continue-on-error: true
        env:
          DBT_CI_TABLES_COMMENT_PATH: ${{ runner.temp }}/dbt-ci-tables-comment/comment_body.md
          GH_TOKEN: ${{ github.token }}
          MARKER: <!-- spellbook-dbt-run-built-tables:${{ inputs.project }} -->
          PR_NUMBER: ${{ github.event.number }}
        run: |
          [ -f "$DBT_CI_TABLES_COMMENT_PATH" ] || exit 0
          comment_body="$(< "$DBT_CI_TABLES_COMMENT_PATH")"
          comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate --jq ".[] | select(.body | contains(env.MARKER)) | .id" | head -n 1)"
          if [ -n "$comment_id" ]; then
            current_body="$(mktemp)"
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" --jq .body > "$current_body"
            cmp -s "$current_body" "$DBT_CI_TABLES_COMMENT_PATH" || gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" --raw-field body="$comment_body" || echo "Skipping PR comment update; token cannot write comments."
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --raw-field body="$comment_body" || echo "Skipping PR comment creation; token cannot write comments."
          fi
