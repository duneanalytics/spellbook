name: Pytest Prices Automation

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/**'

permissions:
  contents: read

jobs:
  pytest-automation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: uv sync --locked

    - name: Run pytest
      run: uv run pytest scripts/test_token_checker.py
