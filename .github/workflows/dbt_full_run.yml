name: dbt CI full run

# Manually-triggered CI run across all dbt projects, without filtering on changes.
# Useful to validate changes to shared tools (scripts, uv.lock, workflows) that the PR flow can't
# exercise pre-merge.
#
# This runs the code of the selected branch directly, so it will only work on branches from the
# duneanalytics/spellbook repo. It will not work from forks.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  find-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
    steps:
      - name: Find open PR for this branch
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # If the dispatched branch has an open PR, report commit statuses to it
          # (same dbt-ci/<project> contexts as the PR flow); otherwise run silently.
          pr_number=$(gh api "repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${{ github.ref_name }}&state=open" --jq '.[0].number // empty')
          if [ -n "$pr_number" ]; then
            echo "Found open PR #$pr_number for ${{ github.ref_name }}; reporting statuses to ${{ github.sha }}"
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "No open PR for ${{ github.ref_name }}; skipping status reporting"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
          fi

  dbt-run:
    needs: find-pr
    strategy:
      fail-fast: false
      matrix:
        project:
          - daily_spellbook
          - dex
          - hourly_spellbook
          - solana
          - tokens
    uses: ./.github/workflows/dbt_run.yml
    secrets: inherit
    permissions:
      contents: read
      actions: read
      statuses: write
    with:
      project: ${{ matrix.project }}
      pr_number: ${{ needs.find-pr.outputs.pr_number }}
      head_sha: ${{ needs.find-pr.outputs.head_sha }}
