name: Upload Contribution Data

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 * * *'

jobs:
  upload_status:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Checkout main branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Configure dbt
        env:
          DBT_PROFILES_YML_BASE64: ${{ secrets.DBT_PROFILES_YML_BASE64 }}
        run: |
          mkdir $HOME/.dbt
          echo $DBT_PROFILES_YML_BASE64 | base64 --decode > $HOME/.dbt/profiles.yml

      - name: Setup variables
        run: |
            echo "PROFILE=--profiles-dir $HOME/.dbt --profile dunesql" >> $GITHUB_ENV

      - name: Sync Python dependencies
        run: uv sync --locked

      - name: dbt dependencies
        run: "uv run dbt deps"

      - name: Run dbt debug on Trino if dunesql engine is used, and retry until cluster is available
        run: "uv run bash ./scripts/ensure_cluster.sh"

      - name: Create Manifest
        run: "uv run dbt compile --profiles-dir $HOME/.dbt --profile dunesql"

      - name: Upload translation status CSV to Dune
        env:
          DUNE_API_KEY_PROD: ${{ secrets.DUNE_API_KEY_PROD }}
        run: "uv run python scripts/spells_metadata.py"
