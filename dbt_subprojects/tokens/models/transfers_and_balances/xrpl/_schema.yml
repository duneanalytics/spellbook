  - name: tokens_xrpl_base_transfers
    meta:
      blockchain: xrpl
      sector: tokens
      short_description: "Unified XRPL base transfer rows."
      contributors: krishhh, tomfutago
    config:
      tags: ['tokens', 'transfers', 'xrpl']
    description: "Unified XRPL base transfer rows built by unioning per-transaction-type XRPL transfer models."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - block_date
              - unique_key
      - check_seed:
          arguments:
            seed_file: ref('tokens_xrpl_base_transfers_seed')
            match_columns:
              - block_date
              - tx_hash
              - transfer_type
              - xrpl_asset_id
            check_columns:
              - token_standard
              - tx_from
              - tx_to
              - tx_index
              - issuer
              - currency
              - currency_hex
              - amount_raw
              - amount
              - transaction_type
              - transaction_result
              - partial_payment_flag
    columns:
      - <<: *unique_key
        data_tests:
          - not_null
      - *blockchain
      - *block_date
      - *block_time
      - *block_month
      - *block_number
      - *tx_hash
      - *token_standard
      - *tx_from
      - *tx_to
      - *tx_index
      - *transfer_from
      - *transfer_to
      - *xrpl_asset_id
      - *issuer
      - *currency
      - *currency_hex
