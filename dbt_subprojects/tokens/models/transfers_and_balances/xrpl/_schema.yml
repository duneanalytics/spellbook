  - name: tokens_xrpl_amm_balance_deltas
    meta:
      blockchain: xrpl
      sector: tokens
      short_description: "XRPL AMM pool-side balance deltas."
      contributors: krishhh, tomfutago
    config:
      tags: ['tokens', 'transfers', 'xrpl']
    description: "Normalized XRPL AMM pool balance deltas used to derive deposit, withdraw, mint, and burn transfer rows."
    columns:
      - *unique_key
      - *blockchain
      - *block_date
      - *block_time
      - *block_month
      - *block_number
      - *tx_hash
      - *token_standard
      - *tx_from
      - *tx_to
      - *tx_index
      - *transfer_from
      - *transfer_to
      - name: xrpl_asset_id
        description: "Synthetic XRPL asset identifier built from issuer and currency for local AMM normalization."
      - *issuer
      - *currency
      - *currency_hex
      - *amount_raw
      - *amount
      - *transfer_type
      - *transaction_type
      - *transaction_result
      - *partial_payment_flag
      - *updated_at

