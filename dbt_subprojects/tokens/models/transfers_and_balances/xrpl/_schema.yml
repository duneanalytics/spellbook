      short_description: "XRPL PaymentChannelClaim transfer rows."
      contributors: krishhh, tomfutago
    config:
      tags: ['tokens', 'transfers', 'xrpl']
    description: "Transfer rows derived from successful XRPL PaymentChannelClaim transactions using PayChannel balance deltas."
    columns:
      - *unique_key
      - *blockchain
      - *block_date
      - *block_time
      - *block_month
      - *block_number
      - *tx_hash
      - *token_standard
      - *tx_from
      - *tx_to
      - *tx_index
      - *transfer_from
      - *transfer_to
      - *xrpl_asset_id
      - *issuer
      - *currency
      - *currency_hex
      - *amount_raw
      - *amount
      - *transfer_type
      - *transaction_type
      - *transaction_result
