  - name: tokens_xrpl_transfers
    meta:
      blockchain: xrpl
      sector: tokens
      short_description: "XRPL transfers with metadata and pricing."
      contributors: krishhh, tomfutago
      docs_slug: /curated/token-transfers/xrpl/xrpl-token-transfers
    config:
      tags: ['tokens', 'transfers', 'xrpl']
    description: "XRPL token transfers enriched with currency display metadata and XRP USD pricing."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - block_date
              - unique_key
    columns:
      - <<: *unique_key
        data_tests:
          - not_null
      - *blockchain
      - *block_date
      - *block_time
      - *block_month
      - *block_number
      - *tx_hash
      - *token_standard
      - *tx_from
      - *tx_to
      - *tx_index
      - *transfer_from
      - *transfer_to
      - *xrpl_asset_id
      - *issuer
      - *currency
      - *currency_hex
      - name: symbol
        description: "Display symbol for the XRPL asset."
      - name: decimals
        description: "Display decimals for XRP; null for issued assets whose values are already decimalized."
      - *amount_raw
      - *amount
      - name: price_usd
        description: "Minute-level XRP USD price when available."
      - name: amount_usd
        description: "USD value for XRP transfers when price data is available."
      - *transfer_type
      - *transaction_type
      - *transaction_result
      - *partial_payment_flag
      - *updated_at

  - name: tokens_xrpl_net_transfers_daily
    meta:
      blockchain: xrpl
      sector: tokens
      short_description: "XRPL daily net transfer volume."
      contributors: krishhh, tomfutago
    config:
      tags: ['tokens', 'net_transfers', 'xrpl']
    description: "Daily XRPL net transfer volume in USD, computed by netting sender and receiver address flows within each day."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - blockchain
              - block_date
    columns:
      - name: blockchain
        description: "The blockchain of the transfer volume."
        data_tests:
          - not_null
      - name: block_date
        description: "The date of the transfer volume bucket."
        data_tests:
          - not_null
      - name: net_transfer_amount_usd
        description: "The total positive net USD transfer volume for the day."
