version: 2

models:
  - name: tokens_transfers
    meta:
      docs_slug: /curated/token-transfers/evm/token-transfers
      sector: tokens
      short_description: "All fungible token transfers (native and ERC20) across all EVM-compatible chains, including sender, receiver, amount, and token metadata. For a unified view that includes both EVM and non-EVM chains, use tokens_multichain.transfers instead."
      contributors: aalan3, jeff-dude, 0xBoxer, hildobby, hosuke, tomfutago
    config:
      tags: ['tokens','transfers','evm']
    description: >
      Transfers of all kinds of fungible tokens across all EVM-compatible networks on Dune. This model contains
      EVM-only data. For a unified view that includes both EVM and non-EVM chains, use
      tokens_multichain.transfers instead.
    columns:
      - &unique_key
        name: unique_key
        description: "Surrogate key to identify unique row"
      - &blockchain_transfer
        name: blockchain
        description: "The blockchain of the transfer"
      - &block_month_transfer
        name: block_month
        description: "The month of the block"
      - &block_date_transfer
        name: block_date
        description: "The date of the block"
      - &block_time_transfer
        name: block_time
        description: "The time of the block"
      - &block_number_transfer
        name: block_number
        description: "The block number"
      - &tx_hash_transfer
        name: tx_hash
        description: "The transaction hash"
      - &evt_index_transfer
        name: evt_index
        description: "The log event index of the transfer"
      - &trace_address_transfer
        name: trace_address
        description: "The trace address of the transfer"
      - &token_standard_transfer
        name: token_standard
        description: "The token standard of the transfer"
      - &tx_from_transfer
        name: tx_from
        description: "The transaction sender"
      - &tx_to_transfer
        name: tx_to
        description: "The transaction receiver"
      - &tx_index_transfer
        name: tx_index
        description: "The transaction index"
      - &from_transfer
        name: from
        description: "The sender of the transfer"
      - &to_transfer
        name: to
        description: "The receiver of the transfer"
      - &contract_address_transfer
        name: contract_address
        description: "The contract address of the transfer"
      - &symbol_transfer
        name: symbol
        description: "The token symbol transferred"
      - &amount_raw_transfer
        name: amount_raw
        description: "The raw amount of the transfer"
      - &amount_transfer
        name: amount
        description: "The display amount of the transfer"
      - &price_usd_transfer
        name: price_usd
        description: "The USD price used to calculate the amount_usd"
      - &amount_usd_transfer
        name: amount_usd
        description: "The USD amount of the transfer"
      - name: _updated_at
        description: "Timestamp when this row was last written"

  - name: tokens_net_transfers_daily
    meta:
      sector: tokens
      contributors: jeff-dude, krishhh, tomfutago
    config:
      tags: ['tokens', 'net_transfers']
    description: &net_transfers_description |
      "The amount returned is the net received amount in a transaction. This gets to the heart of what was really transfered
      in a transaction, as the amounts that go from and back to a single address don't actually count as real transfers.
      For example, if I give you a dollar and then you give it back to me in a single transaction that should count as $0 
      because nothing was effectively transferred. If I give you two dollars and you give one back to me that should count as $1
      because one dollar was effectively transfered.

      The reason we filter where net_received is greater than 0 is because if you sum the negative net received (aka sent)
      with the positive net received (aka received) it adds up to 0 since the net sent should equal the net received. 
      For example, if I give you $1 that's -1 sent (from me) and +1 received (by you) which adds to 0. 
      This query counts the received to show that $1 was effectively transfered."

  - name: tokens_net_transfers_daily_asset
    meta:
      sector: tokens
      contributors: jeff-dude, krishhh, tomfutago
    config:
      tags: ['tokens', 'net_transfers']
    description: "Total transfer amount per day per asset across chains"

  - name: tokens_evm_transfers
    meta:
      sector: tokens
      contributors: kryptaki
    config:
      tags: ['tokens','transfers', 'evm']
    description: >
      Fungible token transfers across all EVM-compatible networks only. This model contains the same data as tokens.transfers
      but is located in the tokens_evm schema to explicitly indicate it contains EVM-only data. Use this model when
      you need to query EVM transfers specifically, or use tokens_multichain.transfers if you need transfers from
      both EVM and non-EVM chains.
    columns:
      - <<: *unique_key
      - <<: *blockchain_transfer
      - <<: *block_month_transfer
      - <<: *block_date_transfer
      - <<: *block_time_transfer
      - <<: *block_number_transfer
      - <<: *tx_hash_transfer
      - <<: *evt_index_transfer
      - <<: *trace_address_transfer
      - <<: *token_standard_transfer
      - <<: *tx_from_transfer
      - <<: *tx_to_transfer
      - <<: *tx_index_transfer
      - <<: *from_transfer
      - <<: *to_transfer
      - <<: *contract_address_transfer
      - <<: *symbol_transfer
      - <<: *amount_raw_transfer
      - <<: *amount_transfer
      - <<: *price_usd_transfer
      - <<: *amount_usd_transfer

  - name: tokens_transfers_last_updated
    meta:
      sector: tokens
      short_description: "Per-blockchain, per-month metadata showing when tokens.transfers was last updated."
      contributors: jeff-dude
    config:
      tags: ['tokens','transfers','metadata']
    description: >
      Metadata table tracking the last update timestamp for each blockchain and block_month partition
      in tokens.transfers. Used for monitoring data freshness and shared via Databricks.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - blockchain
              - block_month
    columns:
      - name: blockchain
        description: "The blockchain of the transfers partition"
        data_tests:
          - not_null
      - name: block_month
        description: "The month of the transfers partition"
        data_tests:
          - not_null
      - name: last_update_date
        description: "The most recent _updated_at timestamp across all rows in this blockchain/block_month partition"
        data_tests:
          - not_null

  - name: tokens_multichain_transfers
    meta:
      sector: tokens
      short_description: "Unified fungible token transfers across EVM and non-EVM chains with a chain-agnostic schema."
      contributors: kryptaki, tomfutago
      docs_slug: /curated/token-transfers/multichain/multichain-token-transfers
    config:
      tags: ['tokens', 'transfers', 'multichain']
    description: >
      Unified view of fungible token transfers across EVM-compatible chains, Solana, Aptos, Sui, Stellar, and XRPL with a
      chain-agnostic schema. For EVM-only transfers, use tokens_evm.transfers, and for chain-specific
      transfer details, use the chain-level transfers models.
    columns:
      - <<: *unique_key
      - <<: *blockchain_transfer
      - <<: *block_time_transfer
      - <<: *block_date_transfer
      - <<: *block_month_transfer
      - name: block_number
        description: "Chain-native block, slot, checkpoint, ledger, or transaction ordering number for the transfer, such as EVM block number, Solana slot, Aptos block height, Sui checkpoint, Stellar ledger sequence, or XRPL ledger index."
      - name: tx_id
        description: "Chain-native transaction identifier, such as EVM transaction hash, Solana transaction id/signature, Sui transaction digest, Aptos transaction hash, Stellar transaction hash, or XRPL transaction hash."
      - name: tx_index
        description: "Nullable chain-native transaction index or transaction ordering identifier."
      - name: event_index
        description: "Nullable primary event, instruction, or operation index for the transfer."
      - name: sub_event_index
        description: "Nullable secondary event, instruction, or matched-counterpart index for the transfer."
      - name: from_address
        description: "The sender owner/account of the transfer, stored as string."
      - name: to_address
        description: "The receiver owner/account of the transfer, stored as string."
      - name: tx_signer
        description: "The transaction signer or sender when available, stored as string."
      - name: token_address
        description: "Address-like token identifier, such as EVM contract address, Solana mint, Sui package address, Aptos package address, Stellar contract id, or XRPL issuer."
      - name: token_id
        description: "Canonical full chain-native token identifier. This matches token_address on chains where the address is the full token id, and uses richer identifiers such as Sui coin type, Aptos asset type, Stellar asset/contract id, or XRPL asset id where needed."
      - name: token_symbol
        description: "The token symbol transferred"
      - <<: *token_standard_transfer
      - <<: *amount_raw_transfer
      - <<: *amount_transfer
      - <<: *price_usd_transfer
      - <<: *amount_usd_transfer
      - name: transfer_type
        description: "Nullable chain-native transfer classification or action."
      - name: _updated_at
        description: "Timestamp when this row was last written, when provided by the source model."
