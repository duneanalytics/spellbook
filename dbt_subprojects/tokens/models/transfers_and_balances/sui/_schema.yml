version: 2

models:
  - name: tokens_sui_base_transfers
    meta:
      blockchain: sui
      sector: tokens
      contributors: tomasz
    config:
      tags: ['tokens', 'transfers', 'sui']
    description: "Sui fungible-token base transfers reconstructed as net owner-to-owner value movements from canonical object ownership and balance changes, including deleted-object lineage recovery for merge-side outflows."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - block_date
            - unique_key
    columns:
      - name: unique_key
        description: "Surrogate key to identify unique row."
        data_tests:
          - not_null
      - name: blockchain
        description: "The blockchain of the transfers."
      - name: block_date
        description: "The date of the checkpoint that includes the transfer."
        data_tests:
          - not_null
      - name: block_time
        description: "The timestamp of the transfer transaction."
      - name: block_number
        description: "The Sui checkpoint number."
      - name: tx_hash
        description: "The transaction digest, decoded to varbinary."
      - name: tx_digest
        description: "The original Base58-encoded Sui transaction digest."
      - name: evt_index
        description: "Event index when applicable (null for this model)."
      - name: trace_address
        description: "Trace address when applicable (null for this model)."
      - name: token_standard
        description: "Token standard marker: native for SUI, coin for non-native Sui coins."
      - name: tx_from
        description: "The transaction sender."
      - name: tx_to
        description: "The transaction receiver when a top-level receiver exists (null on Sui canonical txs)."
      - name: tx_index
        description: "Transaction position inside the checkpoint."
      - name: transfer_type
        description: "Reconstructed transfer classification: transfer, mint, or burn."
      - name: from_owner_type
        description: "Sui owner type for the sender side (for example AddressOwner, ObjectOwner, Shared, Immutable, synthetic)."
      - name: to_owner_type
        description: "Sui owner type for the receiver side (for example AddressOwner, ObjectOwner, Shared, Immutable, synthetic)."
      - name: from
        description: "Owner address or object ID that sent value."
      - name: to
        description: "Owner address or object ID that received value."
      - name: from_owner_object_id
        description: "Sender-side owner object ID when the owner type is ObjectOwner."
      - name: to_owner_object_id
        description: "Receiver-side owner object ID when the owner type is ObjectOwner."
      - name: contract_address
        description: "The package address portion of the Sui coin type."
      - name: amount_raw
        description: "Raw transfer amount."
      - name: coin_type
        description: "Fully qualified Sui coin type (for precise metadata joins)."

