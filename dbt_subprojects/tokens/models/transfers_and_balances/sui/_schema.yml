      - name: to
        description: "Receiver owner from reconstructed transfer row."
      - name: amount_raw
        description: "Raw transfer amount from reconstructed transfer row."
      - name: token_standard
        description: "Token standard marker inherited from the transfer model."
      - name: contract_address
        description: "Package address portion of the Sui coin type."
      - name: symbol
        description: "Token symbol from transfer enrichment."
      - name: amount
        description: "Formatted token amount from transfer enrichment."
      - name: price_usd
        description: "USD price from transfer enrichment."
      - name: amount_usd
        description: "USD amount from transfer enrichment."
      - name: event_index
        description: "Event index within the transaction."
      - name: event_sender
        description: "Event sender address."
      - name: event_package
        description: "Sui package address that emitted the event."
      - name: event_type
        description: "Fully qualified Move event type."
      - name: event_module
        description: "Move module inferred from event_type."
      - name: event_name
        description: "Event name inferred from event_type."
      - name: event_type_params
        description: "Type parameters extracted from event_type when present."
      - name: coin_type_hint
        description: "Primary coin type hint extracted from event JSON or event type."
      - name: coin_type_in_hint
        description: "Input-side coin type hint extracted from event JSON when present."
      - name: coin_type_out_hint
        description: "Output-side coin type hint extracted from event JSON when present."
      - name: match_reason
        description: "Heuristic describing why this event was matched to the transfer row."
      - name: event_json
        description: "Raw event JSON payload for protocol-specific downstream parsing."
      - name: match_priority
        description: "Numeric match quality ranking (lower is better)."
      - name: match_confidence
        description: "Categorical match confidence derived from match_priority."
      - name: transfer_match_rank
        description: "Rank of this event match within a transfer."
      - name: is_primary_match
        description: "True when this row is the best-ranked event match for its transfer."
      - name: transfer_match_count
        description: "Number of event matches linked to the same transfer."
      - name: event_match_count
        description: "Number of transfers linked to the same tx/event tuple."
      - name: allocation_weight
        description: "Equal-weight allocation factor across matches for a transfer."
      - name: allocated_amount_usd
        description: "amount_usd weighted by allocation_weight to reduce overcounting risk."

