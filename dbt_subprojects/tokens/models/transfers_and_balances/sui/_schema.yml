version: 2

models:
  - name: tokens_sui_coin_object_history
    meta:
      blockchain: sui
      sector: tokens
      short_description: "Full Coin<T> object state history by object_id + version."
      contributors: tomfutago
    config:
      tags: ['tokens', 'transfers', 'sui']
    description: "Incremental history of Sui Coin<T> object states (Created/Mutated), one row per object_id + version."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - object_id
            - version
    columns:
      - &object_id
        name: object_id
        description: "Sui coin object identifier."
        data_tests:
          - not_null
      - &version
        name: version
        description: "Object version at this historical state."
        data_tests:
          - not_null

  - name: tokens_sui_supply_signals
    meta:
      blockchain: sui
      sector: tokens
      short_description: "Per-tx Sui supply signals with mint/burn type."
      contributors: tomfutago
    config:
      tags: ['tokens', 'transfers', 'sui']
    description: "Per-transaction, per-coin supply signals on Sui from generic treasury events, package-aware treasury events, and CCTP message patterns, with one normalized supply_event_type output."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - block_date
            - unique_key
    columns:
      - &block_date
        name: block_date
        description: "The date of the signal event."
        data_tests:
          - not_null
      - &unique_key
        name: unique_key
        description: "Surrogate key for tx_digest + coin_type signal row."
        data_tests:
          - not_null
      - name: tx_digest
        description: "Sui transaction digest."
      - name: coin_type
        description: "Normalized Sui coin type for the signal."
      - name: has_treasury_mint
        description: "True when mint supply signal is detected from treasury events."
      - name: has_treasury_burn
        description: "True when burn supply signal is detected from treasury events."
      - name: has_cctp_message_received
        description: "True when CCTP message receive signal is detected."
      - name: has_cctp_deposit_for_burn
        description: "True when CCTP deposit-for-burn signal is detected."
      - name: supply_event_type
        description: "Normalized supply event label per tx_digest + coin_type ('mint'/'burn'); null when signal directions are ambiguous."

  - name: tokens_sui_base_transfers
    meta:
      blockchain: sui
      sector: tokens
      short_description: "Base Sui Coin<T> cross-address transfers with supply flags."
      contributors: 0xboxer, tomfutago, 0xRob
    config:
      tags: ['tokens', 'transfers', 'sui']
    description: "Sui Coin<T> base transfers for all fungible coin types, restricted to cross-address movements and enriched with supply-event signals only."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - block_date
            - unique_key
    columns:
      - *block_date
      - *unique_key
      - name: tx_hash
        description: "Transaction hash as varbinary."
      - &contract_address
        name: contract_address
        description: "Coin package address."
      - &contract_address_full
        name: contract_address_full
        description: "Full Sui coin type."
      - &amount_raw
        name: amount_raw
        description: "Raw transfer amount."
      - name: transfer_type
        description: "Object-lifecycle transfer label (for example object_created/object_deleted), not a standalone economic intent label."
      - name: is_cross_address_transfer
        description: "True when resolved sender and receiver addresses differ."
      - name: is_supply_event
        description: "True only when supply-event signals and transaction net delta direction agree."
      - name: supply_event_type
        description: "Conservative mint/burn classification derived from treasury/CCTP-like event patterns."

  - name: tokens_sui_transfers
    meta:
      blockchain: sui
      sector: tokens
      short_description: "Sui Coin<T> transfers with metadata and USD values."
      contributors: tomfutago
    config:
      tags: ['tokens', 'transfers', 'sui']
    description: "Sui cross-address Coin<T> transfers enriched with coin metadata (symbol/decimals), USD valuation, and supply-event flags."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - block_date
            - unique_key
    columns:
      - *block_date
      - *unique_key
      - *contract_address
      - *contract_address_full
      - name: symbol
        description: "Token symbol from dex_sui.coin_info, with prices symbol fallback."
      - name: decimals
        description: "Token decimals from dex_sui.coin_info, with prices decimals fallback."
      - *amount_raw
      - name: amount
        description: "Transfer amount scaled by decimals."
      - name: price_usd
        description: "Hourly USD price."
      - name: amount_usd
        description: "USD value of transfer amount."
