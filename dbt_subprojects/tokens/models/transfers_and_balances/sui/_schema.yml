  - name: tokens_sui_transfer_activity_legs_base
    meta:
      blockchain: sui
      sector: tokens
      contributors: tomasz
    config:
      tags: ['tokens', 'transfers', 'sui', 'activity', 'base']
    description: "Base candidate mappings between reconstructed Sui transfer rows and on-chain event-level activity legs within the same transaction."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - block_date
            - unique_key
    columns:
      - name: unique_key
        description: "Surrogate key to identify unique row."
        data_tests:
          - not_null
      - name: blockchain
        description: "The blockchain of the transfer activity leg."
      - name: block_date
        description: "The date of the checkpoint that includes the transfer activity leg."
        data_tests:
          - not_null
      - name: block_time
        description: "The timestamp of the event."
      - name: block_number
        description: "The Sui checkpoint number."
      - name: tx_hash
        description: "The transaction digest, decoded to varbinary."
      - name: tx_digest
        description: "The original Base58-encoded Sui transaction digest."
      - name: transfer_unique_key
        description: "Foreign key to tokens_sui_base_transfers.unique_key."
      - name: tx_from
        description: "The transaction sender."
      - name: tx_index
        description: "Transaction position inside the checkpoint."
      - name: coin_type
        description: "Canonical Sui coin type for the transfer row."
      - name: transfer_type
        description: "Reconstructed transfer classification: transfer, mint, or burn."
      - name: from
        description: "Sender owner from reconstructed transfer row."
      - name: to
        description: "Receiver owner from reconstructed transfer row."
      - name: amount_raw
        description: "Raw transfer amount from reconstructed transfer row."
      - name: event_index
        description: "Event index within the transaction."
      - name: event_sender
        description: "Event sender address."
      - name: event_package
        description: "Sui package address that emitted the event."
      - name: event_type
        description: "Fully qualified Move event type."
      - name: event_module
        description: "Move module inferred from event_type."
      - name: event_name
        description: "Event name inferred from event_type."
      - name: event_type_params
        description: "Type parameters extracted from event_type when present."
      - name: coin_type_hint
        description: "Primary coin type hint extracted from event JSON or event type."
      - name: coin_type_in_hint
        description: "Input-side coin type hint extracted from event JSON when present."
      - name: coin_type_out_hint
        description: "Output-side coin type hint extracted from event JSON when present."
      - name: match_reason
        description: "Heuristic describing why this event was matched to the transfer row."
      - name: event_json
        description: "Raw event JSON payload for protocol-specific downstream parsing."

