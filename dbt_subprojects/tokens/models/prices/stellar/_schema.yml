version: 2

models:
  - name: prices_stellar_tokens
    meta:
      blockchain: stellar
      sector: prices
      contributors: tomfutago
    config:
      tags: ['prices', 'tokens', 'usd', 'stellar']
    description: "Price tokens on Stellar"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - contract_address
      - test_prices_tokens_against_erc20
    columns:
      - name: token_id
        description: "Id of the token at coinpaprika. This id is required to pull the price feed data. NOTE: Not all tokens are listed at coinpaprika - consider using price data from DEX sources in this case or submit a listing request at coinpaprika."
      - name: blockchain
        description: "Native blockchain of the token, if any"
        data_tests:
          - accepted_values:
              arguments:
                values: [ "stellar" ]
      - name: contract_address
        description: "Canonical Stellar asset identifier stored as a varbinary cast of ASSET-ISSUER."
      - name: symbol
        description: "Token symbol"
      - name: decimals
        description: "Number of decimals for the token contract"
