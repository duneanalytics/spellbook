version: 2

models:
  - name: prices_xrpl_tokens
    meta:
      blockchain: xrpl
      sector: prices
      contributors: tomfutago
    config:
      tags: ['prices', 'tokens', 'usd', 'xrpl']
    description: "Price tokens on the XRP Ledger"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - contract_address
      - test_prices_tokens_against_erc20
    columns:
      - name: token_id
        description: "Id of the token at coinpaprika. This id is required to pull the price feed data. NOTE: Not all tokens are listed at coinpaprika - consider using price data from DEX sources in this case or submit a listing request at coinpaprika."
      - name: blockchain
        description: "Native blockchain of the token, if any"
        data_tests:
          - accepted_values:
              arguments:
                values: [ "xrpl" ]
      - name: contract_address
        description: "XRPL asset identifier encoded as currency plus issuer account"
      - name: contract_address_native
        description: "Readable XRPL asset identifier in currency.issuer form"
      - name: symbol
        description: "Token symbol"
      - name: decimals
        description: "Number of decimals for the token contract"
