version: 2

models:
  - name: stablecoins_multichain_tokens
    meta:
      sector: stablecoins
      contributors: tomfutago
    config:
      tags: ['tokens', 'stablecoins', 'multichain']
    description: >
      Unified stablecoin token list across EVM, Solana, and Tron. The model stitches the
      source schemas into a superset and normalizes all address-like columns to varchar.
    columns:
      - name: blockchain
        description: "Blockchain name"
      - name: token_address
        description: "Stablecoin token address or mint address in varchar format"
      - name: currency
        description: "ISO 4217 currency code the stablecoin is pegged to (e.g. USD, EUR)"
      - name: symbol
        description: "Token symbol"
      - name: decimals
        description: "Token decimals"
