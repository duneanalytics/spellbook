version: 2

models:
  - name: world_megaeth_base_trades
    meta:
      blockchain: megaeth
      sector: dex
      project: world
      contributors: hosuke
    config:
      tags: ['megaeth', 'world', 'dex', 'aggregator', 'trades']
    description: >
      world CompositeExchange aggregator base trades on MegaETH for downstream dex_aggregator models.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - block_date
            - blockchain
            - project
            - version
            - tx_hash
            - evt_index
            - trace_address
    columns:
      - &blockchain
        name: blockchain
        description: "Blockchain which the aggregator is deployed"
      - &project
        name: project
        description: "Project name of the aggregator"
      - &version
        name: version
        description: "Version identifier for decoded CompositeExchange flow"
      - &block_date
        name: block_date
        description: "UTC event block date of each aggregator trade"
      - &block_time
        name: block_time
        description: "UTC event block time of each aggregator trade"
      - &token_bought_amount_raw
        name: token_bought_amount_raw
        description: "Raw value of the token bought"
      - &token_sold_amount_raw
        name: token_sold_amount_raw
        description: "Raw value of the token sold"
      - &token_bought_address
        name: token_bought_address
        description: "Contract address of token bought"
      - &token_sold_address
        name: token_sold_address
        description: "Contract address of token sold"
      - &taker
        name: taker
        description: "Address of the user receiving bought asset in tx-level flow"
      - &maker
        name: maker
        description: "Counterparty address if available"
      - &project_contract_address
        name: project_contract_address
        description: "CompositeExchange contract address executing the trade path"
      - &tx_hash
        name: tx_hash
        description: "Transaction hash"
      - &tx_from
        name: tx_from
        description: "Transaction sender"
      - &tx_to
        name: tx_to
        description: "Transaction recipient"
      - &trace_address
        name: trace_address
        description: "Address of trace within call graph"
      - &evt_index
        name: evt_index
        description: "Synthetic event index for trace-derived trade"
      - &block_month
        name: block_month
        description: "UTC event block month of each aggregator trade"
