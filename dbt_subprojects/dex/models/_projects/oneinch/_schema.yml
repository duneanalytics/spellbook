      - name: resolver_address
      - name: resolver_name
      - name: resolver_names
      - name: promotion_modes
      - name: first_promoted_at
      - name: last_promoted_at
      - name: access_tokens
      - name: access_modes
      - name: access_tokens_legacy
      - name: access_modes_legacy
      - name: first_access_transfer_at
