  - name: oneinch_ar_trades
    meta:
      blockchain: ['ethereum', 'bnb', 'polygon', 'arbitrum', 'avalanche_c', 'gnosis', 'optimism', 'fantom', 'base', 'zksync', 'linea', 'sonic', 'unichain']
      sector: oneinch
      contributors: ['max-morrow', 'grkhr', 'thevaizman']
    config:
      tags: ['oneinch', 'ar', 'trades']
    description: >
        1inch aggregation router trades
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - blockchain
              - tx_hash
              - trace_address
              - evt_index
      - oneinch_no_cross_chain_placeholder_tokens
    columns:
      - name: blockchain
        data_tests:
          - not_null
      - name: project
      - name: version
      - name: block_date
      - name: block_month
      - name: block_time
      - name: token_bought_symbol
      - name: token_sold_symbol
