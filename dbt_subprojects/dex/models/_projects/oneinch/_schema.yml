      - name: token_sold_amount_raw
      - name: amount_usd
      - name: token_bought_address
      - name: token_sold_address
      - name: taker
      - name: maker
      - name: project_contract_address
      - name: tx_hash
        data_tests:
          - not_null
      - name: tx_from
      - name: tx_to
      - name: trace_address
        data_tests:
