              - id
    columns:
      - *blockchain
      - *project
      - *version
      - *id
      - *fee
      - *token0
      - *token1
      - *creation_block_time
      - *creation_block_number
      - name: contract_address
        description: "Contract address used to create the pool"

  - name: uniswap_v2_zora_pools
    meta:
