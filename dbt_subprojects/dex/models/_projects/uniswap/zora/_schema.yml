  - name: uniswap_zora_trades
    meta:
      blockchain: zora
      sector: dex
      contributors: Henrystats
    config:
      tags: [ 'dex' ]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - block_month
              - tx_hash
              - evt_index

  - name: uniswap_v4_zora_swaps
    meta:
      blockchain: zora
      sector: dex
      project: uniswap
      contributors: thevaizman
    config:
      tags: ['zora', 'dex', 'trades', 'uniswap', 'v4']
    description: >
      All Uniswap V4 swaps on zora, decoded from the PoolManager swap calls. Swaps on
      BaseAggregatorHook pools (which route the swap to an external DEX) are flagged via
      is_aggregator_hook_swap. Feeds the venue-side uniswap_v4_zora.base_trades view
      (dex.trades) and uniswap_v4_zora_aggregator_base_trades (dex_aggregator.trades).
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - tx_hash
              - evt_index
    columns:
      - name: tx_hash
        data_tests:
          - not_null
      - name: evt_index
        data_tests:
          - not_null

  - name: uniswap_v4_zora_aggregator_base_trades
    meta:
      blockchain: zora
      sector: dex_aggregator
      project: uniswap
      contributors: thevaizman
    config:
      tags: ['zora', 'dex_aggregator', 'trades', 'uniswap', 'v4']
    description: >
      Uniswap V4 swaps on zora executed on BaseAggregatorHook pools. The hook holds no V4
      liquidity and routes the entire swap to an external DEX, so these rows are recorded as
      aggregator trades (project uniswap, version 4) in dex_aggregator.trades instead of
      dex.trades, where they would double-count the backing venue's row.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - tx_hash
              - evt_index
    columns:
      - name: tx_hash
        data_tests:
          - not_null
      - name: evt_index
        data_tests:
          - not_null

  - name: uniswap_v4_zora_sqrtpricex96_latest
    meta:
      blockchain: zora
      sector: dex
      project: uniswap
    config:
      tags: ['zora', 'pools', 'liquidity', 'uniswap', 'sqrtpricex96']
    description: >
      Latest sqrtPriceX96 per pool among price-change events older than 7 days.
      Deep-history seed companion for uniswap_v4_zora_sqrtpricex96: lets the price builder avoid
      self-scanning its full history every run to recover each pool's previous price.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - blockchain
              - id
    columns:
      - name: blockchain
        description: "Blockchain"
        data_tests:
          - not_null
      - name: id
        description: "Pool ID"
        data_tests:
          - not_null
      - name: block_time
        description: "Block time of this pool's latest aged price event"
      - name: block_number
        description: "Block number of this pool's latest aged price event"
      - name: evt_index
        description: "Event index of this pool's latest aged price event"
      - name: block_index_sum
        description: "Monotonic block/tx/evt ordinal of the latest aged price event"
      - name: sqrtpricex96
        description: "Pool price (sqrtPriceX96) at the latest aged price event"
