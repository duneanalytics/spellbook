version: 2

models:
  - name: zeroex_arbitrum_api_fills_tx
    meta:
      blockchain: arbitrum
      project: zeroex
      contributors: rantum
    config:
      tags: ['arbitrum', '0x', 'aggregator']
    description: >
      Pre-materialized 0x API affiliate/tracker scan on Arbitrum, extracted once from
      arbitrum.traces. Shared staging model for zeroex_arbitrum_api_fills so the non-pushable
      calldata affiliate-selector scan runs a single time per build instead of being
      re-inlined many times.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - block_month
              - tx_hash
              - block_number
    columns:
      - name: tx_hash
        description: "Transaction hash of the 0x API fill"
        data_tests:
          - not_null
      - name: affiliate_address
        description: "0x affiliate/tracker address parsed from calldata"
      - name: block_number
        description: "Block number of the transaction"
        data_tests:
          - not_null
      - name: block_time
        description: "Block time of the transaction (carried for partitioning/incremental)"
      - name: block_month
        description: "Month partition derived from block_time"
        data_tests:
          - not_null

  - name: zeroex_arbitrum_api_fills
    meta:
      blockchain: arbitrum
      project: zeroex
      contributors: rantum, danning.sui, bakabhai993
    config:
      tags: [arbitrum','0x','dex_aggregator','dex','aggregator']
    description: >
        0x API erc20 swaps raw fills (including multihops) and also native swaps thru 0x exchange contracts (without using 0x API) on arbitrum
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - block_date
              - tx_hash
              - evt_index
      - check_seed:
          arguments:
            seed_file: ref('zeroex_arbitrum_api_fills_sample')
            match_columns:
              - tx_hash
              - evt_index
            check_columns:
              - maker
              - taker
    columns:
      - &tx_hash
        name: tx_hash
        description: "Transaction hash of the fill"
      - &evt_index
        name: evt_index
        description: "Index of the corresponding fill/swap event"
      - &contract_address
        name: contract_address
        desctiption: "The address of the contract which fired the fill/swap event"
      - &block_time
        name: block_time
        description: "Timestamp for block event time in UTC"
      - &block_date
        name: block_date
        description: "UTC event block date of each trade"
      - &block_month
        name: block_month
        description: "UTC event block month of each trade"
      - &maker
        name: maker
        description: "For limit order, the wallet who posted order first; for AMM orders, the liquidity pools; for RFQ orders, the professional market makers."
      - &taker
        name: taker
        description: "User who is taking the order"
      - &taker_token
        name: taker_token
        description: "Contract address of the token taker sells"
      - &maker_token
        name: maker_token
        description: "Contract address of the token taker buys"
      - &taker_token_amount
        name: taker_token_amount
        description: "The after-decimal amount of the token taker sells"
      - &taker_token_amount_raw
        name: taker_token_amount_raw
        description: "The raw amount of the token taker sells"
      - &maker_token_amount
        name: maker_token_amount
        description: "The after-decimal amount of the token taker buys"
      - &maker_token_amount_raw
        name: maker_token_amount_raw
        description: "The raw amount of the token taker buys"
      - &type
        name: type
        description: "The liquidity route the order went thru"
      - &affiliate_address
        name: affiliate_address
        description: "The recipient address of the affiliate, or the applications that is using 0x API, for receiving affiliate fee"
      - &swap_flag
        name: swap_flag
        description: "If the swap was filled/consumed thru 0x API"
      - &matcha_limit_order_flag
        name: matcha_limit_order_flag
        description: "If the swap's order was initially created and submitted thru Matcha. This is for Matcha related query needs."
      - &volume_usd
        name: volume_usd
        description: "Trading volume measured in USD value" 
      - &tx_from
        name: tx_from
        description: "Address which initiated the trade"
      - &tx_to
        name: tx_to
        description: "Address which received the trade"
      - &blockchain
        name: blockchain
        description: "Blockchain which the aggregator project is deployed"

  - name: zeroex_arbitrum_api_fills_deduped
    meta:
      blockchain: arbitrum
      project: zeroex
      contributors: rantum, danning.sui, bakabhai993
    config:
      tags: ['arbitrum','0x','dex_aggregator','dex','aggregator']
    description: >
        0x API erc20 swaps raw fills (deduped) on arbitrum
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - block_date
              - tx_hash
              - evt_index
      - check_seed:
          arguments:
            seed_file: ref('zeroex_arbitrum_api_fills_deduped_sample')
            match_columns:
              - tx_hash
              - evt_index
            check_columns:
              - maker
              - taker
    columns:
      - *blockchain
      - *block_date
      - *block_month
      - *block_time
      - &taker_symbol
        name: taker_symbol
        description: "Symbol of the token taker sells"
      - &maker_symbol
        name: maker_symbol
        description: "Symbol of the token taker buys"
      - &token_pair
        name: token_pair
        description: "Token pair traded"    
      - *taker_token_amount
      - *maker_token_amount
      - *taker_token_amount_raw
      - *maker_token_amount_raw
      - *volume_usd
      - *taker_token
      - *maker_token
      - *taker
      - *maker
      - *affiliate_address
      - *tx_hash
      - *tx_from
      - *tx_to
      - *evt_index
      - *type
      - *swap_flag
      - *contract_address
      - &fills_within
        name: fills_within
        description: "fills in then multihop, if present"          

  - name: zeroex_arbitrum_native_fills 
    meta:
      blockchain: arbitrum
      project: zeroex
      contributors: rantum, danning.sui, bakabhai993
    config:
      tags: ['arbitrum','0x','dex_aggregator','dex','aggregator']
    description: >
        0x API erc20 swaps raw fills (including multihops) and also native swaps thru 0x exchange contracts (without using 0x API) on arbitrum
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - block_time
              - tx_hash
              - evt_index
      - check_seed:
          arguments:
            seed_file: ref('zeroex_arbitrum_native_fills_sample')
            match_columns:
              - tx_hash
              - evt_index
            check_columns:
              - maker
              - taker
              - maker_token
              - taker_token
    columns:
      - *tx_hash
      - *contract_address
      - *block_time
      - &block_number
        name: block_number
        description: "Block number of the fill"
      - *maker
      - *taker
      - *taker_token
      - *taker_symbol
      - *maker_token
      - *maker_symbol      
      - *token_pair
      - *taker_token_amount
      - *taker_token_amount_raw
      - *maker_token_amount
      - *maker_token_amount_raw
      - *volume_usd
      - *tx_from
      - *tx_to
      - *evt_index
      - *blockchain
      - &native_fill_type
        name: native_fill_type
        description: "type of native fill - RFQ, limit order, OTC, fill"
      - *matcha_limit_order_flag
      - &protocol_fee_paid_eth
        name: protocol_fee_paid_eth
        description: "The protocol fee paid in ETH"

  - name: zeroex_v2_arbitrum_settler_txs
    meta:
      blockchain: arbitrum
      project: zeroex
      contributors: rantum
    config:
      tags: ['arbitrum', '0x', 'settler']
    description: >
      Pre-materialized 0x Settler transactions on Arbitrum, extracted once from arbitrum.traces.
      Shared staging model for zeroex_v2_arbitrum_trades so the non-pushable settler-trace scan
      runs a single time per build instead of being re-inlined ~14x.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - block_month
              - tx_hash
              - rn
    columns:
      - name: tx_hash
        description: "Transaction hash of the 0x Settler call"
      - name: block_time
        description: "Block time of the transaction"
      - name: block_number
        description: "Block number of the transaction"
      - name: method_id
        description: "4-byte method id of the settler call"
      - name: contract_address
        description: "Settler contract address called by the transaction"
      - name: settler_address
        description: "Resolved 0x Protocol settler address"
      - name: zid
        description: "0x interaction id extracted from the tracker calldata"
      - name: tag
        description: "Tag extracted from the tracker calldata, keyed off method_id"
      - name: rn
        description: "Row number of the settler call within the transaction, ordered by zid"
      - name: cow_rn
        description: "Row number for CoW Protocol settler calls within the transaction"
      - name: taker
        description: "Resolved taker address for the settler call"
      - name: block_month
        description: "Month partition derived from block_time"

  - name: zeroex_v2_arbitrum_trades
    meta:
      blockchain: arbitrum
      project: zeroex
      contributors: rantum
    config:
      tags: ['arbitrum','0x','dex_aggregator','dex','aggregator']
    description: >
        0x API erc20 trades through 0x Settler contracts. No fills, only deduped transactions.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - block_month
              - block_date
              - tx_hash
              - evt_index
              - trace_address
    columns:
      - *blockchain
      - *block_date
      - *block_month
      - *block_time
      - *taker_symbol
      - *maker_symbol
      - *token_pair
      - *taker_token_amount
      - *maker_token_amount
      - *taker_token_amount_raw
      - *maker_token_amount_raw
      - *volume_usd
      - *taker_token
      - *maker_token
      - *taker
      - *maker
      - *affiliate_address
      - *tx_hash
      - *tx_from
      - *tx_to
      - *evt_index
      - *type
      - *swap_flag
      - *contract_address
      - *fills_within

  - name: zeroex_arbitrum_settler_addresses
    meta:
      blockchain: arbitrum
      project: zeroex
      contributors: hosuke
    config:
      tags: ['arbitrum', '0x', 'settler']
    description: >
      0x Protocol settler addresses for Arbitrum blockchain.
      This table contains the settler addresses used by the 0x Protocol on Arbitrum,
      along with their activation timestamps and token IDs.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - settler_address
              - token_id
    columns:
      - name: tx_hash
        description: "Transaction hash where the settler address was registered"
      - name: settler_address
        description: "Address of the 0x Protocol settler contract"
      - name: token_id
        description: "Token ID associated with the settler address"
      - name: begin_block_time
        description: "Block time when the settler address was activated"
      - name: begin_block_number
        description: "Block number when the settler address was activated"
      - name: end_block_time
        description: "Block time when the settler address was deactivated (null if still active)"
      - name: end_block_number
        description: "Block number when the settler address was deactivated (null if still active)"