      - name: swap_evt_dexrouterbuy
        description: "DexRouterBuy event emitted by the nad.fun swap router (0x003989CD92C31A51D8B20bDBd0c51E444f88d081) — trader spends WMON (amountIn) and receives `token` (amountOut)."
