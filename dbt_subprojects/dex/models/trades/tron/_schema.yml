version: 2

models:
  - name: dex_tron_trades
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - blockchain
            - project
            - version
            - tx_hash
            - evt_index
      - dbt_utils.accepted_range:
          column_name: amount_usd
          max_value: 1000000000 # $1b is an arbitrary number, intended to flag outlier amounts early

  - name: dex_tron_base_trades

  - name: sunswap_v3_tron_base_trades
    meta:
      blockchain: tron
      sector: dex
      project: sunswap
      contributors: tomfutago
    config:
      tags: ["tron", "dex", "trades", "sunswap", "v3"]
    description: "sunswap tron v3 base trades"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - tx_hash
            - evt_index
      - check_dex_base_trades_seed:
          seed_file: ref('sunswap_tron_base_trades_seed')
          filter:
            version: 3

  - name: sunswap_v3_tron_swap_events
    meta:
      blockchain: tron
      sector: dex
      project: sunswap
      contributors: tomfutago
    config:
      tags: ["tron", "dex", "trades", "sunswap", "v3"]
    description: "sunswap tron v3 swap events decoded from tron.logs"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - evt_tx_hash
            - evt_index
            - contract_address

  - name: dex_tron_token_volumes_daily
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - blockchain
            - token_address
            - block_date
