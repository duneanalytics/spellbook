version: 2

models:
  - name: dex_robinhood_trades
    data_tests:
      - check_columns_dex_trades
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - blockchain
              - project
              - version
              - tx_hash
              - evt_index
      - dbt_utils.accepted_range:
          arguments:
            column_name: amount_usd
            max_value: 1000000000 # $1b is an arbitrary number, intended to flag outlier amounts early

  - name: dex_robinhood_base_trades

  - name: uniswap_v2_robinhood_base_trades
    meta:
      blockchain: robinhood
      sector: dex
      project: uniswap
      contributors: jeff-dude
    config:
      tags: [ 'robinhood', 'dex', 'trades', 'uniswap', 'v2' ]
    description: "uniswap robinhood v2 base trades"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - tx_hash
              - evt_index
    columns:
      - name: tx_hash
        data_tests:
          - not_null
      - name: evt_index
        data_tests:
          - not_null

