version: 2

models:
  - name: dex_flare_trades_migration_test
    description: >
      Temporary migration-test clone of dex_flare_trades with isolated *_migration_test schemas upstream.
      Not for production.
    data_tests:
      - check_columns_dex_trades
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - blockchain
              - project
              - version
              - tx_hash
              - evt_index
              - block_month
      - dbt_utils.accepted_range:
          arguments:
            column_name: amount_usd
            max_value: 1000000000 # $1b is an arbitrary number, intended to flag outlier amounts early

  - name: dex_flare_trades_migration_test_view
    description: >
      Simple view on top of dex_flare_trades_migration_test for migration validation.
      Not for production.

  - name: dex_flare_base_trades_migration_test
    meta:
      blockchain: flare
      sector: dex
      project: dex
      contributors: hosuke
    config:
      tags: ['flare', 'dex', 'trades']
    description: >
      Temporary migration-test union of flare platform base trades; dex_flare_migration_test.base_trades.

  - name: enosys_v2_flare_base_trades_migration_test
    meta:
      blockchain: flare
      sector: dex
      project: enosys
      contributors: hosuke
    config:
      tags: [ 'flare', 'dex', 'trades', 'enosys', 'v2' ]
    description: "Migration-test clone — Enosys V2 Flare base trades."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - tx_hash
              - evt_index

  - name: sparkdex_v2_flare_base_trades_migration_test
    meta:
      blockchain: flare
      sector: dex
      project: sparkdex
      contributors: hosuke
    config:
      tags: ['flare', 'dex', 'trades', 'sparkdex', 'v2']
    description: "Migration-test clone — SparkDex V2 Flare base trades."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - tx_hash
              - evt_index
      - check_dex_base_trades_seed:
          arguments:
            seed_file: ref('sparkdex_flare_base_trades_seed')
            filter:
              version: 2

  - name: sparkdex_v3_flare_base_trades_migration_test
    meta:
      blockchain: flare
      sector: dex
      project: sparkdex
      contributors: hosuke
    config:
      tags: [ 'flare', 'dex', 'trades', 'sparkdex', 'v3' ]
    description: "Migration-test clone — SparkDex V3 Flare base trades."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - tx_hash
              - evt_index
      - check_dex_base_trades_seed:
          arguments:
            seed_file: ref('sparkdex_flare_base_trades_seed')
            filter:
              version: 3

  - name: blazeswap_flare_base_trades_migration_test
    meta:
      blockchain: flare
      sector: dex
      project: blazeswap
      contributors: hosuke
    config:
      tags: [ 'flare', 'dex', 'trades', 'blazeswap' ]
    description: "Migration-test clone — Blazeswap Flare base trades."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - tx_hash
              - evt_index
      - check_dex_base_trades_seed:
          arguments:
            seed_file: ref('blazeswap_flare_base_trades_seed')
