version: 2

models:
  - name: scroll_address_metrics
    columns:
      - name: blockchain
      - name: address
        data_tests:
          - unique
      - name: min_block_time
        description: "block_time of the first transaction initiated by the address"

  - name: scroll_transaction_metrics
    meta:
      blockchain: scroll
      sector: metrics
      contributors: 0xRob
    config:
      tags: [ 'scroll','metrics' ]
    description: "fundamental blockchain transaction metrics"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - blockchain
              - block_hour

  - name: scroll_transaction_address_metrics
    meta:
      blockchain: scroll
      sector: metrics
      contributors: jeff-dude
    config:
      tags: [ 'scroll','metrics', 'address' ]
    description: "fundamental blockchain transaction address metrics"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - blockchain
              - block_hour
              - from_address
              - to_address
    columns:
      - name: blockchain
        data_tests:
          - not_null
      - name: block_hour
        data_tests:
          - not_null
      - name: from_address
        data_tests:
          - not_null
      - name: to_address
        data_tests:
          - not_null