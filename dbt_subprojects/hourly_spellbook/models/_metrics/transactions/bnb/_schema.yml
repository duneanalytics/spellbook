version: 2
models:
- name: bnb_transaction_metrics
  meta:
    blockchain: bnb
    sector: metrics
    contributors: 0xRob
  config:
    tags:
    - bnb
    - metrics
  description: fundamental blockchain transaction metrics
  data_tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns:
        - blockchain
        - block_hour
- name: bnb_transaction_address_metrics
  meta:
    blockchain: bnb
    sector: metrics
    contributors: jeff-dude
  config:
    tags:
    - bnb
    - metrics
    - address
  description: fundamental blockchain transaction address metrics
  data_tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns:
        - blockchain
        - block_hour
        - from_address
        - to_address
  columns:
  - name: blockchain
    data_tests:
    - not_null
  - name: block_hour
    data_tests:
    - not_null
  - name: from_address
    data_tests:
    - not_null
  - name: to_address
    data_tests:
    - not_null
