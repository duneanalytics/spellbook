version: 2

models:
  - name: nft_marketplaces_info
    meta:
      blockchain: ethereum, polygon, bnb, avalanche_c, gnosis, optimism, arbitrum, fantom
      sector: nft
      contributors: hildobby
    config:
      tags: ['nft', 'ethereum', 'polygon', 'bnb', 'avalanche_c', 'gnosis', 'optimism', 'arbitrum', 'fantom', 'info']
    description: >
        NFT marketplaces info
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - project
    columns:
      - name: project
        description: "Marketplace codename"
      - name: name
        description: "Marketplace capitalised name"
      - name: marketplace_type
        description: "Type of marketplace"
      - name: x_username
        description: "Username on X"
