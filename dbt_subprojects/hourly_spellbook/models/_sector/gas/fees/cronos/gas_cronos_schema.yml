version: 2

models:
  - name: gas_cronos_fees
    meta:
      blockchain: cronos
      sector: gas
      contributors: jeff-dude
    config:
      tags: ['cronos', 'gas', 'fees']
    description: >
        Gas Fees on cronos
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - block_month
              - tx_hash
      - check_seed:
          arguments:
            seed_file: ref('evm_gas_fees')
            filter:
              blockchain: cronos
            match_columns:
              - blockchain
              - tx_hash
            check_columns:
              - tx_fee_raw
      - dbt_utils.expression_is_true:
          arguments:
            expression: "tx_fee_raw = reduce(map_values(tx_fee_breakdown_raw),uint256 '0',(s, x) -> s + x,s -> s)"
          config:
            where: "block_time > now() - interval '7' day"
    columns:
      - name: block_month
        data_tests:
          - not_null
      - name: tx_hash
        data_tests:
          - not_null
