version: 2

models:
  - name: gas_fees
    meta:
      sector: gas
      short_description: "Gas fees paid per transaction across all EVM-compatible chains, including base fee, priority fee, and USD-denominated cost."
      contributors: soispoke, ilemi, 0xRob, jeff-dude, hosuke, tomfutago
      docs_slug: /curated/gas-fees/fees
    description: >
        Gas Fees across chains
    columns:
      - &blokchain
        name: blockchain
        description: "Blockchain name"
      - &block_month
        name: block_month
        description: "Month for block event time in UTC"
      - &block_day
        name: block_day
        description: "Day for block event time in UTC"
      - &block_time
        name: block_time
        description: "Timestamp for block event time in UTC"
      - &block_number
        name: block_number
        description: "Block number"
      - &tx_hash
        name: tx_hash
        description: "Primary key of the transaction"
      - &tx_index
        name: tx_index
        description: "Index position of the transaction within its block"
      - &tx_sender
        name: tx_sender
        description: "Initiated the transaction"
      - &tx_receiver
        name: tx_receiver
        description: "Received the transaction"
      - &native_token_symbol
        name: native_token_symbol
        description: "Symbol of native token for the blockchain"
      - &tx_amount_native
        name: tx_amount_native
        description: "Amount of native tokens transferred from sender to recipient"
      - &tx_amount_usd
        name: tx_amount_usd
        description: "Amount of $USD transferred from sender to recipient"
      - &tx_fee_native
        name: tx_fee_native
        description: "Total amount of native tokens paid in gas fees"
      - &tx_fee_usd
        name: tx_fee_usd
        description: "Total amount of $USD paid in gas fees"
      - &burned_native
        name: burned_native
        description: "Total amount of native tokens burned for this transaction"
      - &burned_usd
        name: burned_usd
        description: "Total amount of $USD burned for this transaction"
      - &validator
        name: validator
        description: "Address of blockchain validator for this transaction within the block"
      - &gas_price_gwei
        name: gas_price_gwei
        description: "Gas price (per gas unit) denoted in gwei"
      - &gas_price_usd
        name: gas_price_usd
        description: "Gas price (per gas unit) denoted in $USD"
      - &gas_used
        name: gas_used
        description: "Amount of gas units consumed by the transaction"
      - &gas_limit
        name: gas_limit
        description: "Maximum amount of gas units that can be consumed by the transaction"
      - &gas_usage_percent
        name: gas_usage_percent
        description: "Percentage of Gas Used relative to the gas limit"
      - &type
        name: type
        description: "Transaction type"

  - name: gas_evm_fees
    meta:
      sector: gas_evm
      short_description: "Transaction gas fees across EVM-compatible chains under the explicit gas_evm namespace."
      contributors: soispoke, ilemi, 0xRob, jeff-dude, hosuke, tomfutago
    config:
      tags: ['gas', 'fees', 'evm']
    description: >
      Compatibility view over gas.fees that excludes the non-EVM Tron rows and exposes the
      aggregate's EVM-compatible chain coverage under gas_evm.fees.
    columns:
      - name: blockchain
        description: "Blockchain on which the transaction occurred"
      - name: block_month
        description: "UTC month of the transaction block"
      - name: block_date
        description: "UTC date of the transaction block"
      - name: block_time
        description: "UTC timestamp of the transaction block"
      - name: block_number
        description: "Number of the block containing the transaction"
      - name: tx_hash
        description: "Hash of the transaction"
      - name: tx_index
        description: "Index position of the transaction within its block"
      - name: tx_from
        description: "Address that initiated the transaction"
      - name: tx_to
        description: "Address called by the transaction"
      - name: gas_price
        description: "Gas price paid per unit of gas"
      - name: gas_used
        description: "Amount of gas consumed by the transaction"
      - name: currency_symbol
        description: "Symbol of the blockchain's native fee currency"
      - name: tx_fee
        description: "Total transaction fee denominated in the native fee currency"
      - name: tx_fee_usd
        description: "Total transaction fee denominated in USD"
      - name: tx_fee_raw
        description: "Total transaction fee in the native currency's base unit"
      - name: tx_fee_breakdown
        description: "Transaction fee components denominated in the native fee currency"
      - name: tx_fee_breakdown_usd
        description: "Transaction fee components denominated in USD"
      - name: tx_fee_breakdown_raw
        description: "Transaction fee components in the native currency's base unit"
      - name: tx_fee_currency
        description: "Token address or identifier of the currency used to pay transaction fees"
      - name: block_proposer
        description: "Address of the validator or proposer for the transaction's block"
      - name: gas_limit
        description: "Maximum amount of gas available to the transaction"
      - name: gas_limit_usage
        description: "Share of the transaction gas limit that was consumed"
