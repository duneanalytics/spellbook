version: 2

models:
  - name: gas_hedera_fees
    meta:
      blockchain: hedera
      sector: gas
      contributors: alicecha
    config:
      tags: ['hedera', 'gas', 'fees']
    description: >
        Gas Fees on Hedera.

        Known limitation: `tx_fee` is computed as `gas_price * gas_used`, where
        `gas_price` from the JSON-RPC is the user's bid, not the effective rate
        the network charges. Legacy txs (simple HBAR transfers) match HashScan
        exactly; AccessList contract calls can over-estimate the actual charged
        fee by up to ~20%. The authoritative `charged_tx_fee` lives on the
        parent Hedera record (mirror node) but is not currently exposed on
        `hedera.transactions`. Switch to `charged_tx_fee` once the indexer
        surfaces it.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - block_month
            - tx_hash
      - check_seed:
          seed_file: ref('evm_gas_fees')
          filter:
            blockchain: hedera
          match_columns:
            - blockchain
            - tx_hash
          check_columns:
            - tx_fee_raw
      - dbt_utils.expression_is_true:
          expression: "tx_fee_raw = reduce(map_values(tx_fee_breakdown_raw),uint256 '0',(s, x) -> s + x,s -> s)"
          config:
            where: "block_time > now() - interval '7' day"
