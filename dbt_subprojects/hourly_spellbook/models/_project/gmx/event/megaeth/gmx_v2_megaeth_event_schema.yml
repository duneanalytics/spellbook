version: 2

models:
  - name: gmx_v2_megaeth_market_created
    meta:
      blockchain: megaeth
      sector: dex
      project: gmx
      contributors: ai_data_master, gmx-io
    config:
      tags: ['megaeth', 'gmx', 'event', 'market_created']
    description: |
      This model extracts and parses `MarketCreated` events from the megaeth blockchain.
      It includes transaction details, addresses, and other relevant metrics related to 
      the creation of markets within the GMX protocol.

    columns:
      - &blockchain  
        name: blockchain
        description: The blockchain network where the event occurred (megaeth)
      - &block_time
        name: block_time
        description: The timestamp of the block when the event was recorded
      - &block_date
        name: block_date
        description: The date extracted from the block timestamp, representing the day the block was created      
      - &block_number
        name: block_number
        description: The block number where the event is included
      - &tx_hash
        name: tx_hash
        description: The hash of the transaction where the event was logged
      - &index
        name: index
        description: The position of the event within the transaction
      - &contract_address
        name: contract_address
        description: The contract address associated with the event 
      - &tx_from
        name: tx_from
        description: The originating address of the transaction, usually representing the sender
      - &tx_to
        name: tx_to
        description: The destination address of the transaction, representing the receiver
      - name: event_name
        description: The type of event recorded, always 'MarketCreated' for this model
        data_tests:
          - not_null 
      - &msg_sender
        name: msg_sender
        description: The address of the sender of the message or transaction.
      - name: account
        description: The address associated with the event
      - &market_token
        name: market_token
        description: The token used to represent the market
        data_tests:
          - not_null
          - unique
      - &index_token
        name: index_token
        description: The token used as the index in the market
        data_tests:
          - not_null
      - &long_token
        name: long_token
        description: The token used for long positions in the market
        data_tests:
          - not_null
      - &short_token
        name: short_token
        description: The token used for short positions in the market
        data_tests:
          - not_null
      - &salt
        name: salt
        description: A unique value used to prevent hash collisions
        data_tests:
          - not_null
      - &spot_only
        name: spot_only
        description: Indicates if the market is spot-only (true when index_token is the zero address)
        data_tests:
          - not_null          
      - &market_token_symbol
        name: market_token_symbol
        description: The symbol of the market token (hardcoded as 'GM' in this model)  
        data_tests:
          - not_null    
      - &market_token_decimals
        name: market_token_decimals
        description: The decimal precision of the market token (hardcoded as 18 in this model)          
        data_tests:
          - not_null         

  - name: gmx_v2_megaeth_glv_created
    meta:
      blockchain: megaeth
      sector: dex
      project: gmx
      contributors: ai_data_master, gmx-io
    config:
      tags: ['megaeth', 'gmx', 'event', 'glv_created']
    description: |
      Processes decoded event data for `GLVCreated` events on the GMX platform in the megaeth blockchain.
      This model extracts key details such as the GLV token, associated tokens, and transaction specifics, enabling
      analysis of GLV creation events on the platform.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
           arguments:
             combination_of_columns:
               - tx_hash
               - index
    columns:
      - *blockchain
      - *block_time
      - *block_date
      - *block_number
      - *tx_hash
      - *index
      - *contract_address
      - name: tx_from
        description: The address that initiated the transaction.
      - name: tx_to
        description: The destination address of the transaction.
      - name: event_name
        description: The type of event recorded, always `GLVCreated` for this model.
      - *msg_sender
      - name: glv_token
        description: The identifier of the GLV token created in the transaction.
      - name: long_token
        description: The long token associated with the GLV creation.
      - name: short_token
        description: The short token associated with the GLV creation.
      - name: salt
        description: A unique salt value used in the GLV creation.
      - name: glv_type
        description: The type of GLV created.
      - name: market_token_symbol
        description: The symbol of the market token involved in the GLV creation.
      - name: market_token_decimals
        description: The decimal precision of the market token involved in the GLV creation.



  - name: gmx_v2_megaeth_open_interest_in_tokens_updated
    meta:
      blockchain: megaeth
      sector: dex
      project: gmx
      contributors: ai_data_master, gmx-io
    config:
      tags: ['megaeth', 'gmx', 'event', 'open_interest_in_tokens_updated']
    description: |
      Combines and processes decoded event data to produce a normalized dataset of updated orders 
      on the GMX platform for the MegaETH blockchain. 
      This model integrates data from the `open_interest_in_tokens_updated` table, enriching it with market-specific details.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
           arguments:
             combination_of_columns:
               - tx_hash
               - index
    columns:
      - *blockchain
      - *block_time
      - *block_date
      - *block_number
      - *tx_hash
      - *index
      - *contract_address
      - name: event_name
        description: The type of event recorded, always 'OpenInterestInTokensUpdated' for this model
        data_tests:
          - not_null 
      - *msg_sender
      - name: market
        description: The market in which the order was updated, decoded from a hexadecimal value.
        data_tests:
          - not_null
      - name: collateral_token
        description: The token used as collateral for the order, decoded from a hexadecimal value.
        data_tests:
          - not_null
      - name: is_long
        description: A boolean flag indicating whether the order is a long position (true) or short position (false).
      - name: next_value
        description: |
          Represents the updated open interest vlaue after the transaction. It is derived by normalizing 
          the raw value using index token decimals.
          This ensures consistent scaling of the value across tokens with varying decimals.
      - name: delta
        description: |
          Indicates the change in open interest. It is calculated by normalizing the raw delta value 
          using index token decimals.
          This normalization accounts for token decimal differences and provides a standardized measure of change.
      - name: tx_from
        description: The address that initiated the transaction
      - name: tx_to
        description: The destination address of the transaction
      - name: tx_index
        description: Index value related to the transaction


  - name: gmx_v2_megaeth_open_interest_updated
    meta:
      blockchain: megaeth
      sector: dex
      project: gmx
      contributors: ai_data_master, gmx-io
    config:
      tags: ['megaeth', 'gmx', 'event', 'open_interest_updated']
    description: |
      Extracts and processes decoded event data for open interest updates on the GMX platform, 
      specifically on the MegaETH blockchain. This model normalizes data, including key metrics like 
      delta and next_value, ensuring consistent scaling based on token decimals.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
           arguments:
             combination_of_columns:
               - tx_hash
               - index
    columns:
      - *blockchain
      - *block_time
      - *block_date
      - *block_number
      - *tx_hash
      - *index
      - *contract_address
      - name: event_name
        description: The type of event recorded, always 'OpenInterestUpdated' for this model
        data_tests:
          - not_null 
      - *msg_sender
      - name: market
        description: The market associated with the open interest update, decoded from a hexadecimal value.
        data_tests:
          - not_null
      - name: collateral_token
        description: The token used as collateral for the open interest, decoded from a hexadecimal value.
        data_tests:
          - not_null
      - name: is_long
        description: |
          A boolean flag indicating whether the open interest update is for a long position (true) or short position (false).
        data_type: boolean
      - name: delta
        description: |
          Represents the change in open interest value, normalized by dividing the raw delta by `POWER(10, 30)`. 
          This ensures consistent scaling for values across tokens with varying decimals.
        data_type: float
        data_tests:
          - not_null
      - name: next_value
        description: |
          Indicates the updated open interest value after the transaction, normalized by dividing 
          the raw value by `POWER(10, 30)` to ensure consistent scaling across tokens.
        data_type: float
        data_tests:
          - not_null
      - name: tx_from
        description: The address that initiated the transaction.
      - name: tx_to
        description: The destination address of the transaction.
      - name: tx_index
        description: The index value related to the transaction.


  - name: gmx_v2_megaeth_oracle_price_update
    meta:
      blockchain: megaeth
      sector: dex
      project: gmx
      contributors: ai_data_master, gmx-io
    config:
      tags: ['megaeth', 'gmx', 'event', 'oracle_price_update']
    description: |
      Processes decoded event data for Oracle Price Updates on the GMX platform in the MegaETH blockchain. 
      The model normalizes price data (min_price and max_price) using token-specific decimals and extracts 
      additional details such as the provider and token involved in the update.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
           arguments:
             combination_of_columns:
               - tx_hash
               - index
    columns:
      - *blockchain
      - *block_time
      - *block_date
      - *block_number
      - *tx_hash
      - *index
      - *contract_address
      - name: event_name
        description: The type of event recorded, always 'OraclePriceUpdate' for this model
        data_tests:
          - not_null 
      - *msg_sender
      - name: token
        description: The token associated with the oracle price update, decoded from a hexadecimal value.
        data_tests:
          - not_null
      - name: provider
        description: The address of the price provider, decoded from a hexadecimal value.
      - name: min_price
        description: The minimum price reported by the oracle.
        data_tests:
          - not_null
      - name: max_price
        description: The maximum price reported by the oracle.
        data_tests:
          - not_null
      - name: timestamp
        description: The timestamp of the oracle price update.
        data_type: timestamp
      - name: tx_from
        description: The address that initiated the transaction.
      - name: tx_to
        description: The destination address of the transaction.
      - name: tx_index
        description: The index value related to the transaction, used for unique identification.


  - name: gmx_v2_megaeth_pool_amount_updated
    meta:
      blockchain: megaeth
      sector: dex
      project: gmx
      contributors: ai_data_master, gmx-io
    config:
      tags: ['megaeth', 'gmx', 'event', 'pool_amount_updated']
    description: |
      Processes decoded event data for Pool Amount Updates on the GMX platform in the MegaETH blockchain.
      This model normalizes token values (next_value and delta) based on token-specific decimals and extracts
      additional details such as the market and token involved in the pool update.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
           arguments:
             combination_of_columns:
               - tx_hash
               - index
    columns:
      - *blockchain
      - *block_time
      - *block_date
      - *block_number
      - *tx_hash
      - *index
      - *contract_address
      - name: event_name
        description: The type of event recorded, always 'PoolAmountUpdated' for this model
        data_tests:
          - not_null 
      - *msg_sender
      - name: market
        description: The market associated with the pool update, decoded from a hexadecimal value.
        data_tests:
          - not_null
      - name: token
        description: The token involved in the pool update, decoded from a hexadecimal value.
        data_tests:
          - not_null
      - name: next_value
        description: |
          The amount in the pool for the specified token, normalized by dividing the raw value
          by `POWER(10, token_decimals)`, where `token_decimals` is derived from ERC-20 token metadata.
        data_tests:
          - not_null
      - name: delta
        description: |
          The change in the pool amount for the specified token, normalized by dividing the raw value
          by `POWER(10, token_decimals)`, where `token_decimals` is derived from ERC-20 token metadata.
        data_tests:
          - not_null
      - name: tx_from
        description: The address that initiated the transaction.
      - name: tx_to
        description: The destination address of the transaction.
      - name: tx_index
        description: The index value related to the transaction, used for unique identification.


  - name: gmx_v2_megaeth_position_impact_pool_amount_updated
    meta:
      blockchain: megaeth
      sector: dex
      project: gmx
      contributors: ai_data_master, gmx-io
    config:
      tags: ['megaeth', 'gmx', 'event', 'position_impact_pool_amount_updated']
    description: |
      Captures pool balance changes related to position impact adjustments on the GMX protocol for MegaETH.
      This model aggregates the normalized `next_value` of the impact pool, tracking changes over time and by token market.
      Each row corresponds to a `PositionImpactPoolAmountUpdated` event on-chain.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
           arguments:
             combination_of_columns:
               - tx_hash
               - index
    columns:
      - *blockchain
      - *block_time
      - *block_date
      - *block_number
      - *tx_hash
      - *index
      - *contract_address
      - name: tx_index
        description: Transaction index within the block
      - *tx_from
      - *tx_to
      - name: event_name
        description: Event name, always 'PositionImpactPoolAmountUpdated' for this model
      - *msg_sender
      - name: market
        description: Market address for which the position impact pool was updated
      - name: next_value
        description: Total value in the impact pool after the update, normalized for decimals associated with the market.
      - name: delta
        description: Change in the impact pool value as a result of the transaction, normalized.
