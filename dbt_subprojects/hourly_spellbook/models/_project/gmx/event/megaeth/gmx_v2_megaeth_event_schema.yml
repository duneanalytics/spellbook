  - name: gmx_v2_megaeth_position_impact_pool_distributed
    meta:
      blockchain: megaeth
      sector: dex
      project: gmx
      contributors: ai_data_master, gmx-io
    config:
      tags: ['megaeth', 'gmx', 'event', 'position_impact']
    description: |
      Processes decoded event data for `PositionImpactPoolDistributed` events on the GMX platform across the MegaETH blockchain.
      This model extracts key details such as distribution amounts and pool impact metrics to analyze the effect of position impact distribution.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
           arguments:
             combination_of_columns:
               - tx_hash
               - index
    columns:
      - *blockchain
      - *block_time
      - *block_date
      - *block_number
      - *tx_hash
      - *index
      - *contract_address
      - name: tx_from
        description: The address initiating the transaction.
      - name: tx_to
        description: The recipient address of the transaction.
      - name: event_name
        description: The name of the event emitted, always `PositionImpactPoolDistributed`.
      - *msg_sender
      - name: market
        description: The specific GMX market where the position impact occurred.
      - name: distribution_amount
        description: The amount distributed to the impact pool.
      - name: next_position_impact_pool_amount
        description: The updated position impact pool amount after the event.


  - name: gmx_v2_megaeth_position_impact_pool_amount_updated
    meta:
      blockchain: megaeth
      sector: dex
      project: gmx
      contributors: ai_data_master, gmx-io
    config:
      tags: ['megaeth', 'gmx', 'event', 'position_impact_pool_amount_updated']
    description: |
      Captures pool balance changes related to position impact adjustments on the GMX protocol for MegaETH.
      This model aggregates the normalized `next_value` of the impact pool, tracking changes over time and by token market.
      Each row corresponds to a `PositionImpactPoolAmountUpdated` event on-chain.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
           arguments:
             combination_of_columns:
               - tx_hash
               - index
    columns:
      - *blockchain
      - *block_time
      - *block_date
      - *block_number
      - *tx_hash
      - *index
      - *contract_address
      - name: tx_index
        description: Transaction index within the block
      - *tx_from
      - *tx_to
      - name: event_name
        description: Event name, always 'PositionImpactPoolAmountUpdated' for this model
      - *msg_sender
      - name: market
        description: Market address for which the position impact pool was updated
      - name: next_value
        description: Total value in the impact pool after the update, normalized for decimals associated with the market.
      - name: delta
        description: Change in the impact pool value as a result of the transaction, normalized.
