version: 2

models:
  - name: cow_protocol_bnb_solvers
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - address
    meta:
      blockchain: bnb
      project: cow_protocol
      contributors: harisang
    config:
      tags: ["bnb", "cow_protocol", "solver"]
    description: >
      CoW Protocol solvers list on BNB

  - name: cow_protocol_bnb_batches
    meta:
      blockchain: bnb
      project: cow_protocol
      contributors: harisang
    config:
      tags: ["bnb", "cow_protocol", "trades", "dex", "aggregator", "auction"]
    description: >
      CoW Protocol enriched batches table on BNB
    data_tests:
      - unique:
          arguments:
            column_name: tx_hash

