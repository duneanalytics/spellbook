  - name: polymarket_polygon_market_details
    meta:
      blockchain: polygon
      sector: prediction_markets
      project: polymarket
      short_description: "Metadata for Polymarket prediction markets, including event and market names, questions, outcome tokens, resolution status, and oracle details."
      contributors: tomfutago, 0xboxer
      docs_slug: /curated/prediction-markets/polymarket/market_details
    config:
      tags: ['polygon','prediction_markets','polymarket','markets']
    description: "Polymarket: combined market data from on-chain and API sources"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - token_id
    columns:
      - name: unique_key
        description: "Unique identifier for the market"
      - name: condition_id
        description: "Condition ID for the market"
      - name: event_market_id
        description: "Identifier for the parent event market in negative risk markets"
      - name: event_market_name
        description: "Overarching event name for the market, or single market when no event exists"
      - name: event_market_description
        description: "Description of the parent event market when available"
      - name: question_id
        description: "Question ID for the market"
      - name: question
        description: "Market question"
      - name: market_description
        description: "Description of the market"
      - name: token_id
        description: "Token ID"
      - name: token_outcome
        description: "Token outcome"
      - name: token_outcome_name
        description: "Combination of token outcome and question"
      - name: active
        description: "Whether the market is active"
      - name: archived
        description: "Whether the market is archived"
      - name: closed
        description: "Whether the market is closed"
      - name: accepting_orders
        description: "Whether the market is accepting orders"
      - name: enable_order_book
        description: "Whether the order book is enabled"
      - name: neg_risk
        description: "Whether it's a negative risk market"
      - name: polymarket_link
        description: "Link to the Polymarket event page"
      - name: polymarket_link_slug
        description: "Slug used for the Polymarket event URL"
      - name: market_start_time
        description: "Start time of the market from the API"
      - name: market_start_time_parsed
        description: "Start time of the market parsed as a timestamp"
      - name: market_end_time
        description: "End time of the market from the API"
      - name: market_end_time_parsed
        description: "End time of the market parsed as a timestamp"
      - name: game_start_time
        description: "Scheduled start time for the underlying event when available"
      - name: seconds_delay
        description: "Settlement delay configured for the market in seconds"
      - name: fpmm
        description: "Associated FPMM contract address when available"
      - name: icon
        description: "Icon URL for the market"
      - name: image
        description: "Image URL for the market"
      - name: tags
        description: "Market category tags from the Polymarket API"
      - name: oracle
        description: "Oracle address used to resolve the market"
      - name: fee_bips
        description: "Polymarket fee setting in basis points"
      - name: outcome
        description: "Resolved outcome for the market, or unresolved when not yet settled"
      - name: resolved_on_timestamp
        description: "Timestamp when the market was resolved"
      - name: last_uploaded_at
        description: "Timestamp of the last API upload for this market record"
      - name: final_price
        description: "Terminal token price after resolution, including 0.5 for 50/50 outcomes"

