  - name: polymarket_polygon_ohlcv_hourly
    meta:
      blockchain: polygon
      sector: prediction_markets
      project: polymarket
      short_description: "Hourly OHLCV candles for Polymarket outcome tokens with forward-filled prices and resolution correction. 2025 data."
      contributors: dpettas
    config:
      tags: ['polygon','prediction_markets','polymarket','ohlcv','static']
    description: "Hourly OHLCV (Open-High-Low-Close-Volume) candles per Polymarket outcome token, with VWAP, volume metrics, and market metadata. Includes forward-filled rows for no-trade hours (prices carried forward, volume/count zeroed). Resolution-corrected close prices for resolved markets. Filtered to 2025 data only."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - hour
            - market_id
            - outcome
    columns:
      - name: hour
        description: "UTC hour bucket for the candle"
        data_tests:
          - not_null
      - name: market_id
        description: "Condition ID cast to varchar, uniquely identifies the YES/NO pair"
        data_tests:
          - not_null
      - name: market_name
        description: "Market question text (e.g., 'Will X happen by Y date?')"
      - name: outcome
        description: "YES or NO token outcome"
        data_tests:
          - not_null
      - name: category
        description: "Market category tags from market details"
      - name: open
        description: "First trade price in the hour (0-1 scale). Forward-filled from last trade for no-trade hours."
      - name: high
        description: "Highest trade price in the hour. Forward-filled from last trade for no-trade hours."
      - name: low
        description: "Lowest trade price in the hour. Forward-filled from last trade for no-trade hours."
      - name: close
        description: "Last trade price in the hour (0-1 scale). Forward-filled for no-trade hours. Resolution-corrected to terminal value (1.0/0.0) for resolved markets post-end-time."
      - name: vwap
        description: "Volume-weighted average price. NULL for forward-filled (no-trade) hours."
      - name: volume_contracts
        description: "Total shares traded in the hour. Zero for forward-filled hours."
      - name: volume_usd
        description: "Total USD notional volume in the hour. Zero for forward-filled hours."
      - name: trade_count
        description: "Number of trades in the hour. Zero for forward-filled hours."
      - name: market_end_time
        description: "Market end time from market details (raw varchar, ISO 8601)"
      - name: market_outcome
        description: "Resolved outcome of the market (yes/no/null if unresolved)"
      - name: event_market_name
        description: "Overarching event name for negRisk markets (e.g., 'Presidential Election 2024')"
      - name: is_forward_filled
        description: "True if this row was generated by forward-fill (no trades occurred in this hour). False for hours with actual trades."
        data_tests:
          - not_null

