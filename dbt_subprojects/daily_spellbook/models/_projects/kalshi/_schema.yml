version: 2

models:
  - name: kalshi_market_details
    meta:
      blockchain: kalshi
      sector: prediction_markets
      project: kalshi
      contributors: allelosi
    config:
      tags: ['kalshi', 'prediction_markets', 'markets']
    description: >
      Kalshi market reference table. Joins market-level data (markets_0003) with event-level
      metadata (market_details_0003). Filtered to markets with >= 100 contracts traded,
      retaining 99.7% of total volume. Includes latest-state pricing snapshot, strike structure,
      settlement info, and resolution rules.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - ticker
    columns:
      - name: ticker
        description: "Unique market identifier (e.g., KXBTCD-26APR04-T99499.99)"
        data_tests:
          - not_null
      - name: event_ticker
        description: "Parent event identifier grouping related markets"
        data_tests:
          - not_null
      - name: market_type
        description: "Market type (e.g., binary)"
      - name: title
        description: "Market question text"
      - name: subtitle
        description: "Market subtitle"
      - name: yes_sub_title
        description: "Label for the Yes outcome"
      - name: no_sub_title
        description: "Label for the No outcome"
      - name: created_time
        description: "When the market was created"
      - name: updated_time
        description: "When the market was last updated"
      - name: open_time
        description: "When trading opened"
      - name: close_time
        description: "When trading closes"
      - name: expiration_time
        description: "Market expiration time"
      - name: latest_expiration_time
        description: "Latest possible expiration time"
      - name: expected_expiration_time
        description: "Expected expiration time"
      - name: settlement_ts
        description: "When the market was settled (null if unsettled)"
      - name: status
        description: "Market lifecycle state (active, finalized, closed, etc.)"
      - name: result
        description: "Settlement outcome (yes, no, or empty if unresolved)"
      - name: settlement_value_dollars
        description: "Payout value per contract at settlement"
      - name: expiration_value
        description: "Expiration outcome value"
      - name: can_close_early
        description: "Whether the market can close before expiration"
      - name: early_close_condition
        description: "Condition that triggers early close"
      - name: yes_bid_dollars
        description: "Best bid price for Yes (latest snapshot)"
      - name: yes_ask_dollars
        description: "Best ask price for Yes (latest snapshot)"
      - name: no_bid_dollars
        description: "Best bid price for No (latest snapshot)"
      - name: no_ask_dollars
        description: "Best ask price for No (latest snapshot)"
      - name: yes_bid_size_fp
        description: "Depth at best Yes bid (contracts)"
      - name: yes_ask_size_fp
        description: "Depth at best Yes ask (contracts)"
      - name: last_price_dollars
        description: "Last traded price"
      - name: previous_yes_bid_dollars
        description: "Previous best Yes bid"
      - name: previous_yes_ask_dollars
        description: "Previous best Yes ask"
      - name: previous_price_dollars
        description: "Previous last traded price"
      - name: volume_fp
        description: "Total contracts traded (lifetime)"
      - name: volume_24h_fp
        description: "Contracts traded in last 24 hours"
      - name: open_interest_fp
        description: "Open interest in contracts"
      - name: strike_type
        description: "Type of strike (binary, structured, between, greater, custom, etc.)"
      - name: floor_strike
        description: "Lower bound for range/threshold markets"
      - name: cap_strike
        description: "Upper bound for range markets"
      - name: custom_strike
        description: "JSON blob with structured strike metadata (e.g., competitor ID, team ID)"
      - name: tick_size
        description: "Minimum price increment"
      - name: fractional_trading_enabled
        description: "Whether fractional contract trading is enabled"
      - name: rules_primary
        description: "Primary resolution rules text"
      - name: series_ticker
        description: "Series the event belongs to"
      - name: event_title
        description: "Parent event title"
      - name: event_sub_title
        description: "Parent event subtitle"
      - name: collateral_return_type
        description: "How collateral is returned"
      - name: mutually_exclusive
        description: "Whether event outcomes are mutually exclusive"
      - name: available_on_brokers
        description: "Whether available via broker integrations"
      - name: product_metadata
        description: "JSON blob with additional product metadata"
      - name: strike_date
        description: "Strike/resolution date from event metadata"
      - name: strike_period
        description: "Strike period description from event metadata"

  - name: kalshi_market_trades
    meta:
      blockchain: kalshi
      sector: prediction_markets
      project: kalshi
      contributors: allelosi
    config:
      tags: ['kalshi', 'prediction_markets', 'trades']
    description: >
      Kalshi trade-level table. Individual trade executions enriched with market metadata.
      Only includes trades for markets with >= 100 contracts traded (inner join to market_details).
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - trade_id
    columns:
      - name: trade_id
        description: "Unique trade identifier"
        data_tests:
          - not_null
      - name: ticker
        description: "Market ticker"
        data_tests:
          - not_null
      - name: created_time
        description: "When the trade occurred"
        data_tests:
          - not_null
      - name: taker_side
        description: "Which side the taker was on (yes/no)"
      - name: count_fp
        description: "Number of contracts traded (fractional)"
      - name: yes_price_dollars
        description: "Price paid for the Yes side"
      - name: no_price_dollars
        description: "Price paid for the No side"
      - name: event_ticker
        description: "Parent event identifier"
      - name: series_ticker
        description: "Series the event belongs to"
      - name: market_type
        description: "Market type (e.g., binary)"
      - name: title
        description: "Market question text"
      - name: subtitle
        description: "Market subtitle"
      - name: status
        description: "Market lifecycle state"
      - name: result
        description: "Settlement outcome"
