version: 2

models:
  - name: kalshi_ohlcv_hourly
    meta:
      blockchain: kalshi
      sector: prediction_markets
      project: kalshi
      short_description: "Hourly OHLCV candles for Kalshi prediction markets with forward-filled prices and resolution correction."
      contributors: allelosi
    config:
      tags: ['kalshi', 'prediction_markets', 'ohlcv']
    description: >
      Hourly OHLCV (Open-High-Low-Close-Volume) candles per Kalshi market, with VWAP, volume
      metrics, and market metadata. Full history — covers all trades available in the underlying
      market_trades table. Includes forward-filled rows for no-trade hours (prices carried
      forward, volume/count zeroed). Resolution-corrected close prices for settled markets.
      Yes-side series only (outcome = 'Yes'); No is implied as 1 - Yes.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - hour
            - market_id
            - outcome
    columns:
      - name: hour
        description: "UTC hour bucket for the candle"
        data_tests:
          - not_null
      - name: market_id
        description: "Kalshi market ticker"
        data_tests:
          - not_null
      - name: market_name
        description: "Market question text (e.g., 'Will X happen by Y date?')"
      - name: outcome
        description: "Always 'Yes' — Kalshi candles are built on yes_price_dollars"
        data_tests:
          - not_null
      - name: category
        description: "Market category extracted from product_metadata JSON"
      - name: open
        description: "First trade price in the hour. Forward-filled from last trade for no-trade hours."
      - name: high
        description: "Highest trade price in the hour. Forward-filled from last trade for no-trade hours."
      - name: low
        description: "Lowest trade price in the hour. Forward-filled from last trade for no-trade hours."
      - name: close
        description: "Last trade price in the hour. Forward-filled for no-trade hours. Resolution-corrected to 1.0/0.0 for settled markets past expiration."
      - name: vwap
        description: "Volume-weighted average price. NULL for forward-filled (no-trade) hours."
      - name: volume_contracts
        description: "Total contracts traded in the hour. Zero for forward-filled hours."
      - name: volume_usd
        description: "Total USD notional volume in the hour. Zero for forward-filled hours."
      - name: trade_count
        description: "Number of trades in the hour. Zero for forward-filled hours."
      - name: market_end_time
        description: "Market expiration time"
      - name: market_outcome
        description: "Settled outcome of the market (yes/no/empty if unresolved)"
      - name: event_market_name
        description: "Parent event title (event_title), falling back to market title — aligns with polymarket_polygon_ohlcv_hourly.event_market_name"
      - name: is_forward_filled
        description: "True if this row was generated by forward-fill (no trades in this hour)"
        data_tests:
          - not_null
