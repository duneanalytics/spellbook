version: 2

models:
  - name: balancer_avalanche_c_pools_tokens_weights
    meta:
      blockchain: avalanche_c
      project: balancer
      contributors: jacektrocinski, viniabussafi
    config:
      tags: ["avalanche_c", "balancer", "pools", "tokens", "weights"]
    description: >
      Token weights in Balancer pools.
    columns:
      - &blockchain
        name: blockchain
        description: "Blockchain"
      - &version
        name: version
        description: "Version of Balancer where the liquidity pool used in transaction is deployed"
      - &pool_id
        name: pool_id
        description: "Unique encoded identifier that refers to each pool"
        data_tests:
          - not_null
      - &token_address
        name: token_address
        description: "Contract address for the token"
      - &normalized_weight
        name: normalized_weight
        description: "Weight of the token in the pool."

  - name: balancer_v2_avalanche_c_pools_tokens_weights
    meta:
      blockchain: avalanche_c
      project: balancer
      contributors: jacektrocinski, viniabussafi
    config:
      tags: ["avalanche_c", "balancer", "pools", "tokens", "weights"]
    description: >
      Token weights in Balancer v2 pools.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - pool_id
            - token_address
    columns:
      - *blockchain
      - *version
      - *pool_id
      - *token_address
      - *normalized_weight

  - name: balancer_v3_avalanche_c_pools_tokens_weights
    meta:
      blockchain: avalanche_c
      project: balancer
      contributors: gustavobftorres
    config:
      tags: ["avalanche_c", "balancer", "pools", "tokens", "weights"]
    description: >
      Token weights in Balancer v3 pools.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - pool_id
            - token_address
    columns:
      - *blockchain
      - *version
      - *pool_id
      - *token_address
      - *normalized_weight

  - name: balancer_v3_avalanche_c_lbps
    meta:
      blockchain: avalanche_c
      project: balancer_v3
      contributors: gustavobftorres
    config:
      tags: ['avalanche_c', 'balancer', 'lbp']
    description: >
      Record of the Liquidity Bootstrapping Pools (LBP) of Balancer, an automated portfolio manager and trading platform, on Avalanche C.
    columns:
      - *blockchain
      - name: pool_symbol
      - name: pool_address
      - name: start_time
      - name: end_time
      - name: project_token
      - name: reserve_token
      - name: project_token_symbol
      - name: reserve_token_symbol
      - name: project_token_start_weight
      - name: reserve_token_start_weight
      - name: project_token_end_weight
      - name: reserve_token_end_weight