version: 2

models:
  - name: sui_coin_transfers_first_attempt
    meta:
      blockchain: sui
      sector: tokens
    config:
      tags: ['sui', 'tokens', 'transfers']
    description: >
      Sui coin transfer model derived from object ownership and balance deltas.
      Tracks coin objects through their version lineage to detect ownership transfers,
      balance changes, and object creation/deletion. Includes signed balance deltas,
      per-transaction reconciliation, and supply event detection.

      IMPORTANT: A single logical transfer (e.g. Alice sends 100 USDC to Bob) typically
      produces 2-4 rows (SplitCoins + MergeCoins + TransferObjects). ~95% of rows are
      same-address bookkeeping (splits, merges). Use is_cross_address_transfer = true
      to filter to actual address-to-address movements, and transfer_direction = 'credit'
      for volume calculations to avoid double-counting.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - block_date
            - unique_key
    columns:
      - name: unique_key
        description: "Surrogate key (tx_digest, object_id, version)"
      - name: blockchain
        description: "Always 'sui'"
      - name: block_month
        description: "Partition column (month)"
      - name: block_date
        description: "Date of the object mutation"
      - name: block_time
        description: "Timestamp of the object mutation"
      - name: block_number
        description: "Sui checkpoint number"
      - name: tx_hash
        description: "Sui transaction digest"
      - name: token_standard
        description: "Always 'sui_coin'"
      - name: tx_from
        description: "Transaction sender from sui.transactions"
      - name: from
        description: "Sender: prev_owner for Mutated objects, tx_sender for Created. Falls back to tx_sender when prev_owner is null."
      - name: to
        description: "Receiver address (current object owner)"
      - name: contract_address
        description: "Coin package address (first segment of coin_type)"
      - name: contract_address_full
        description: "Full Sui coin type string"
      - name: symbol
        description: "Token symbol from coin metadata"
      - name: decimals
        description: "Token decimals from coin metadata"
      - name: amount_raw
        description: "Transfer amount: coin_balance for object_created and ownership-only transfers, abs(balance_delta) for balance changes. Always positive — use transfer_direction or balance_delta for signed accounting."
      - name: balance_delta
        description: "Signed balance change for the object (positive = increase, negative = decrease). Sums to ~0 for balanced txs."
      - name: object_id
        description: "Sui object ID for the coin"
      - name: version
        description: "Object version at this mutation"
      - name: object_status
        description: "Created, Mutated, or Deleted"
      - name: owner_type
        description: "Sui object owner type: AddressOwner (wallet), Shared (protocol/pool), ObjectOwner (wrapped)"
      - name: coin_balance
        description: "Object balance at this version (0 for Deleted)"
      - name: prev_balance
        description: "Object balance at previous version (null for first seen)"
      - name: prev_owner
        description: "Object owner at previous version (null for Created)"
      - name: has_ownership_change
        description: "True when a Mutated object changed owner (prev_owner != receiver)"
      - name: transfer_type
        description: >
          Object-level classification: object_created (new coin via SplitCoins or real mint),
          object_deleted (coin consumed via MergeCoins or real burn),
          ownership_transfer (owner changed, delta=0),
          transfer_with_balance_change (owner changed and delta!=0),
          balance_increase (same owner, delta>0),
          balance_decrease (same owner, delta<0).
          NOTE: object_created/object_deleted do NOT imply supply events — use is_supply_event for that.
      - name: is_cross_address_transfer
        description: "True when from != to — indicates an actual address-to-address movement rather than same-address bookkeeping (splits, merges). Use this to find real transfers."
      - name: is_supply_event
        description: "True when the transaction involves Circle treasury Mint or Burn events for this coin type. Only these represent actual supply changes on Sui."
      - name: supply_event_type
        description: "Type of supply event: 'mint' (treasury::Mint — new supply), 'burn' (treasury::Burn — supply destruction), or null"
      - name: transfer_direction
        description: "credit (balance_delta > 0), debit (balance_delta < 0), or neutral (delta = 0). Use with amount_raw to avoid double-counting: SUM(amount_raw) WHERE transfer_direction = 'credit' gives inflow volume."
      - name: tx_net_delta
        description: "Sum of all balance_deltas for this (tx, coin_type). Zero means fully balanced. Non-zero indicates supply events or untracked object types."
      - name: tx_distinct_receivers
        description: "Count of distinct receivers in this transaction for this coin type"
      - name: tx_distinct_senders
        description: "Count of distinct previous owners in this transaction for this coin type"
      - name: tx_has_bidirectional_deltas
        description: "True when the transaction has both positive and negative deltas for this coin type"
