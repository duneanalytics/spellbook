version: 2

models:
  - name: affluent_ton_supply
    meta:
      blockchain: ton
      sector: lending
      contributors: pshuvalov, okhlopkov
      short_description: "Supply (deposit) events on the Affluent lending protocol on TON."
    config:
      tags: ['ton', 'affluent', 'lending', 'factorial']
    description: "Supply (deposit) events on the Affluent lending protocol on TON."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - tx_hash
            - block_date
    columns:
      - name: block_date
        description: "block_date of the transaction"
      - name: tx_hash
        description: "transaction hash"
      - name: trace_id
        description: "trace id"
      - name: tx_now
        description: "transaction timestamp"
      - name: tx_lt
        description: "transaction logical time"
      - name: pool_address
        description: "Affluent pool address"
      - name: pool_name
        description: "Affluent pool name"
      - name: owner_address
        description: "Owner address"
      - name: asset
        description: "Asset address"
      - name: amount
        description: "Amount of asset"
      - name: share
        description: "Share of asset"
