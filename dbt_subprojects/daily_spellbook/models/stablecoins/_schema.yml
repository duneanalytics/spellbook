version: 2

models:
  - name: stablecoins_multichain_balances
    meta:
      sector: stablecoin
      project: stablecoin
      short_description: "Unified stablecoin balances across all supported chains (EVM, Solana, Tron), providing a single cross-chain view of stablecoin holdings."
      contributors: tomfutago
    config:
      tags: ['stablecoin', 'balances']
    description: "Union of EVM, SVM (Solana) and Tron stablecoin balances with normalized address/token_address types"
    columns:
      - &blockchain
        name: blockchain
        description: "Blockchain for the token"
      - &day
        name: day
        description: "Date on which the token balance is logged"
      - &address
        name: address
        description: "Address for the token holder (varchar)"
      - &token_symbol
        name: token_symbol
        description: "Symbol for the token"
      - &token_address
        name: token_address
        description: "Address for the token (varchar)"
      - &token_standard
        name: token_standard
        description: "Standard for the token"
      - &token_id
        name: token_id
        description: "ID for the token"
      - &balance_raw
        name: balance_raw
        description: "Raw balance for the user (not adjusted for decimals)"
      - &balance
        name: balance
        description: "Balance for the user (adjusted for decimals)"
      - &balance_usd
        name: balance_usd
        description: "USD value of balance for the user"
      - &currency
        name: currency
        description: "ISO 4217 currency code for the stablecoin's pegged currency"
      - &last_updated
        name: last_updated
        description: "UTC timestamp when data was last updated"

  - name: stablecoins_multichain_transfers
    meta:
      sector: stablecoin
      project: stablecoin
      short_description: "Unified stablecoin transfers across all supported chains (EVM, Solana, Tron), providing a single cross-chain view of stablecoin movement."
      contributors: tomfutago
    config:
      tags: ['stablecoin', 'transfers']
    description: "Union of EVM, SVM (Solana) and Tron stablecoin transfers with normalized address/token_address/tx_hash types"
    columns:
      - *blockchain
      - name: block_month
        description: "Month of the transfer"
      - name: block_date
        description: "Date of the transfer"
      - name: block_time
        description: "Timestamp of the transfer"
      - name: block_number
        description: "Block number of the transfer (null for Solana)"
      - name: tx_hash
        description: "Transaction hash (varchar)"
      - name: evt_index
        description: "Event index within the transaction (null for Solana)"
      - name: token_standard
        description: "Token standard (e.g. erc20, spl_token)"
      - *token_address
      - *token_symbol
      - *currency
      - name: amount_raw
        description: "Raw transfer amount (not adjusted for decimals)"
      - name: amount
        description: "Transfer amount (adjusted for decimals)"
      - name: price_usd
        description: "USD price per unit of the stablecoin"
      - name: amount_usd
        description: "USD value of the transfer"
      - name: from
        description: "Sender address (varchar)"
      - name: to
        description: "Recipient address (varchar)"
      - name: unique_key
        description: "Unique identifier for the transfer"

  - name: stablecoins_multichain_tokens
    meta:
      sector: stablecoin
      project: stablecoin
      contributors: tomfutago
    config:
      tags: ['stablecoin', 'tokens']
    description: "Union of EVM, SVM (Solana), and Tron stablecoin token lists with enriched symbol/decimals metadata"
    columns:
      - *blockchain
      - *token_address
      - *currency
      - name: symbol
        description: "Token symbol"
      - name: decimals
        description: "Token decimals"

  - name: stablecoins_balances
    meta:
      sector: stablecoin
      project: stablecoin
      contributors: tomfutago
    config:
      tags: ['stablecoin', 'balances']
    description: "Enriched balances of stablecoin token holders on EVM chains with token metadata and USD prices"
    columns:
      - *blockchain
      - *day
      - *address
      - *token_symbol
      - *token_address
      - *token_standard
      - *token_id
      - *balance_raw
      - *balance
      - *balance_usd
      - *currency
      - *last_updated
