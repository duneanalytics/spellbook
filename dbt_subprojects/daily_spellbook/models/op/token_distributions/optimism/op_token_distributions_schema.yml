version: 2

models:
  - name: op_token_distributions_optimism_project_name_mapping
    meta:
        blockchain: optimism
        project: op
        contributors: msilb7
    config:
      tags: ['optimism','op','grants','project']
    description: >
        A table containing mappings from governance proposal names to Dune project names.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
                - proposal_name
    columns:
      - &proposal_name
        name: proposal_name
        data_tests:
          - not_null
      - &project_name
        name: project_name
        data_tests:
          - not_null
  
  - name: op_token_distributions_optimism_project_wallets
    meta:
      blockchain: optimism
      project: op
      contributors: msilb7
    config:
      tags: ['optimism','op','grants','project']
    description: >
        A table containing mappings for project wallets that we want to track distributions for
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
                - address
                - proposal_name
                - address_descriptor
    columns:
      - &address
        name: address
        data_tests:
          - unique
      - &label
        name: label
      - *proposal_name
      - &address_descriptor
        name: address_descriptor
        data_tests:
          - not_null
      - *project_name

  - name: op_token_distributions_optimism_all_distributions_labels
    meta:
      blockchain: optimism
      project: op
      contributors: msilb7
    config:
      tags: ['optimism','op','grants','addresses']
    description: >
        A table containing unifying labels for tagged wallets that we want to track distributions for
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - label
              - address
    columns:
      - *address
      - *label
      - *proposal_name
      - *address_descriptor
      - *project_name
  
  - name: op_token_distributions_optimism_other_tags
    meta:
      blockchain: optimism
      project: op
      contributors: msilb7
    config:
      tags: ['optimism','op','grants','addresses']
    description: >
        A table containing labels for other addresses that we don't want to track distributions for, but we know what they are.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
                - label
                - address
    columns:
      - *label
      - *address
      - &address_name
        name: address_name
        data_tests:
          - not_null
      