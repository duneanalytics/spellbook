version: 2

models:
  - name: gas_solana_compute_budget
    meta:
      blockchain: solana
      sector: gas
      short_description: "Decoded Solana ComputeBudget program instructions per transaction: compute_limit (SetComputeUnitLimit / opcode 0x02) and compute_unit_price (SetComputeUnitPrice / opcode 0x03), keyed on (block_date, block_slot, tx_id)."
      contributors: robinnehin
    config:
      tags: ['solana', 'gas', 'compute_budget']
    description: >
        Merged ComputeBudget decodings for Solana transactions. Reads
        solana.instruction_calls once with an IN filter on the two opcodes and
        pivots to one row per (block_date, tx_id), so downstream fee models can
        join once instead of twice. gas_solana_compute_limit and
        gas_solana_compute_unit_price are backward-compat views over this table.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - block_date
              - block_hour
              - block_slot
              - tx_id
    columns:
      - name: tx_id
        description: Solana transaction signature
        data_tests:
          - not_null
      - name: block_date
        data_tests:
          - not_null
      - name: block_hour
        description: Truncated to hour, used as partition column
        data_tests:
          - not_null
      - name: block_time
        data_tests:
          - not_null
      - name: block_slot
        data_tests:
          - not_null
      - name: tx_index
        description: Position of the transaction within its block
      - name: compute_limit
        description: Requested compute unit limit (SetComputeUnitLimit / opcode 0x02). NULL when the transaction did not emit this instruction.
      - name: compute_unit_price
        description: Compute unit price in micro-lamports (SetComputeUnitPrice / opcode 0x03). NULL when the transaction did not emit this instruction.
  - name: gas_solana_compute_limit #todo: add full metadata and tests
  - name: gas_solana_compute_unit_price #todo: add full metadata and tests
  - name: gas_solana_tx_fees #todo: add full metadata and tests
  - name: gas_solana_vote_fees #todo: add full metadata and tests
  - name: gas_solana_fees #todo: add tests
    meta:
      blockchain: solana
      sector: gas
      short_description: "Transaction fees paid on the Solana blockchain, including base fees and priority fees per transaction."
      contributors: 0xboxer
      docs_slug: /curated/gas-fees/solana_fees
    config:
      tags: ['solana', 'gas', 'fees']
    description: >
        Gas Fees on Solana, including compute unit prices and prioritization fees
    columns:
      - name: blockchain
        data_tests:
          - accepted_values:
              arguments:
                values: ['solana']
      - name: block_month
        data_tests:
          - not_null
      - name: block_date
        data_tests:
          - not_null
      - name: block_time
        data_tests:
          - not_null
      - name: block_slot
        data_tests:
          - not_null
      - name: tx_hash
        data_tests:
          - not_null
          - unique
      - name: signer
        data_tests:
          - not_null
      - name: compute_unit_price
        description: Compute unit price in lamports
      - name: compute_limit
        description: Compute units used (or limit set)
      - name: tx_fee_raw
        data_tests:
          - not_null
      - name: tx_fee
        data_tests:
          - not_null
      - name: tx_fee_usd
        data_tests:
          - not_null
      - name: tx_fee_breakdown_raw
        description: Breakdown of fee into base_fee and prioritization_fee
      - name: tx_fee_breakdown
        description: Breakdown of fee in SOL
      - name: tx_fee_breakdown_usd
        description: Breakdown of fee in USD
      - name: tx_fee_currency
        data_tests:
          - not_null
      - name: leader
        description: Validator that proposed this block, known as leader in Solana
      - name: tx_type
        description: Vote or normal transaction